<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origin BBS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/forum.css">
</head>
<body>
<div class="container">
  <!-- 环境检测遮罩 -->
  <div id="bbs-detect" class="bbs-detect-overlay">
    <div class="bbs-detect-box">
      <div class="bbs-detect-spinner"></div>
      <h2>📡 正在连接服务器</h2>
      <p>建立与 BBS 服务的连接…</p>
    </div>
  </div>

  <div id="bbs-app" style="display:none;">
    <div class="bbs-layout">
      <!-- 顶部栏 -->
      <div class="bbs-header">
        <div class="bbs-header-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:4px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> Origin BBS
        </div>
        <div class="bbs-user-area">
          <div id="bbs-admin-actions" style="display:none;font-size:12px;">
            <button class="bbs-login-btn" onclick="bbsExport()" title="导出全部数据">导出</button>
            <button class="bbs-login-btn" onclick="document.getElementById('bbs-import-input').click()" title="导入数据覆盖全部">导入</button>
            <input type="file" id="bbs-import-input" accept=".zip" style="display:none">
          </div>
          <div id="bbs-user-badge" class="bbs-user-badge" style="display:none;">
            <span id="bbs-username" style="cursor:pointer" onclick="bbsOpenUser(USER_ID)" title="个人主页"></span>
            <button class="bbs-logout-btn" onclick="bbsLogout()">退出</button>
          </div>
          <button class="bbs-login-btn" id="bbs-login-btn" onclick="bbsShowLogin()">登录</button>
        </div>
      </div>

      <!-- 帖子列表 -->
      <div id="bbs-topic-list">
        <div class="bbs-loading">加载中…</div>
      </div>

      <!-- 帖子详情（隐藏） -->
      <div id="bbs-detail" style="display:none;"></div>
    </div>
  </div>

  <!-- 无后端提示 -->
  <div id="bbs-unavailable" class="bbs-detect-overlay" style="display:none;">
    <div class="bbs-detect-box">
      <h2>🌐 Origin BBS</h2>
      <p style="color:#ff3b30;font-size:15px;">
        此功能需要自建服务器运行。<br>
        请前往 <a href="https://reori.cn" style="color:var(--theme-color,#399FFF);text-decoration:underline;">reori.cn</a> 访问。
      </p>
      <button class="bbs-detect-btn" onclick="location.reload()">重新检测</button>
    </div>
  </div>
</div>

<!-- 登录弹窗 -->
<div id="bbs-login-modal" class="bbs-modal-overlay" style="display:none;">
  <div class="bbs-modal">
    <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>登录</h3>
    <div class="bbs-modal-error" id="bbs-login-error"></div>
    <input type="text" id="bbs-login-user" placeholder="用户名" autocomplete="off">
    <input type="password" id="bbs-login-pass" placeholder="密码" autocomplete="off">
    <div class="bbs-modal-actions">
      <button class="bbs-modal-primary" onclick="bbsDoLogin()">登录</button>
      <button class="bbs-modal-secondary" onclick="bbsCloseLogin()">取消</button>
    </div>
    <div class="bbs-modal-hint">账号需由管理员创建，暂不支持注册</div>
  </div>
</div>

<!-- 发帖全屏页 -->
<div id="bbs-post-modal" class="bbs-post-overlay" style="display:none;">
  <div class="bbs-post-header">
    <div class="bbs-post-header-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>发布帖子</div>
    <div class="bbs-post-header-actions">
      <button class="bbs-post-header-btn bbs-post-submit-btn" onclick="bbsDoPost()">发布</button>
      <button class="bbs-post-header-btn bbs-post-cancel-btn" onclick="bbsClosePost()">取消</button>
    </div>
  </div>
  <div class="bbs-post-body">
    <input type="text" id="bbs-post-title" placeholder="标题" autocomplete="off">
    <textarea id="bbs-post-content" placeholder="写点什么…（支持 Markdown 格式）"></textarea>
    <div class="bbs-post-hint">支持 Markdown · 支持标题、粗体、链接、代码块</div>
  </div>
</div>

<script src="/js/navbar.js"></script>
<script>window.showFooter = false;</script>
<script src="/js/main.js"></script>
<script>
(function() {
  window.__navActive = ["BBS"];
  var TOKEN = localStorage.getItem('bbs_token') || '';
  var USER = localStorage.getItem('bbs_user') || '';
  var USER_ID = localStorage.getItem('bbs_user_id') || '';
  window.USER_ID = USER_ID; // 供 HTML onclick 使用
  var ROLE = '';
  var CURRENT_PAGE = 1;
  var SEARCH_QUERY = '';
  var TOTAL_TOPICS = 0;
  var PAGE_LIMIT = 20;

  // ── 工具函数 ──

  function api(method, path, body) {
    var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
    if (TOKEN) opts.headers['X-Auth-Token'] = TOKEN;
    if (body) opts.body = JSON.stringify(body);
    return fetch(path, opts).then(function(r) { return r.json(); });
  }

  function handleUnauthorized() {
    TOKEN = ''; USER = ''; USER_ID = ''; ROLE = ''; window.USER_ID = '';
    localStorage.removeItem('bbs_token');
    localStorage.removeItem('bbs_user');
    localStorage.removeItem('bbs_user_id');
    location.reload();
  }

  function escapeHtml(s) {
    var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  function highlightText(text, query) {
    if (!query || !text) return escapeHtml(text);
    var q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var parts = text.split(new RegExp('(' + q + ')', 'gi'));
    var html = '';
    for (var i = 0; i < parts.length; i++) {
      if (parts[i].toLowerCase() === query.toLowerCase()) {
        html += '<mark class="bbs-highlight">' + escapeHtml(parts[i]) + '</mark>';
      } else {
        html += escapeHtml(parts[i]);
      }
    }
    return html;
  }

  function authorBadges(authorId, authorRole, authorTags) {
    var badges = [];
    // 管理员标识
    if (authorRole === 'admin') badges.push('<span class="bbs-role-badge admin">管理员</span>');
    // 自己（蓝色）
    if (TOKEN && authorId && authorId === USER_ID) badges.push('<span class="bbs-role-badge self">自己</span>');
    // 自定义标签（紫色）
    if (authorTags && authorTags.length > 0) {
      for (var i = 0; i < authorTags.length; i++) {
        badges.push('<span class="bbs-role-badge custom">' + escapeHtml(authorTags[i]) + '</span>');
      }
    }
    return badges.join('');
  }

  function showToast(msg, duration) {
    duration = duration || 2500;
    var t = document.createElement('div');
    t.className = 'bbs-toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, duration);
  }

  function showLoginError(msg) {
    var el = document.getElementById('bbs-login-error');
    el.textContent = msg; el.style.display = 'block';
  }
  function hideLoginError() {
    document.getElementById('bbs-login-error').style.display = 'none';
  }

  // ── 环境检测 ──

  function detectBackend() {
    fetch('/api/ping', { cache: 'no-store' })
      .then(function(r) {
        if (r.ok) {
          document.getElementById('bbs-detect').style.display = 'none';
          document.getElementById('bbs-app').style.display = '';
          initBBS();
        } else {
          throw new Error('not ok');
        }
      })
      .catch(function() {
        document.getElementById('bbs-detect').style.display = 'none';
        document.getElementById('bbs-unavailable').style.display = '';
      });
  }

  // ── 初始化 ──

  function initBBS() {
    // 应用导航高亮
    if (typeof window.updateNavHighlight === 'function') window.updateNavHighlight();
    // 恢复登录状态（先验证 token 是否有效）
    if (TOKEN) {
      api('POST', '/api/bbs/auth', { verify: true }).then(function(res) {
        if (res.ok) {
          ROLE = res.role || 'user';
          USER = res.user || USER;
          USER_ID = res.user_id || USER_ID; window.USER_ID = USER_ID;
          document.getElementById('bbs-login-btn').style.display = 'none';
          document.getElementById('bbs-user-badge').style.display = '';
          document.getElementById('bbs-username').textContent = USER;
          if (ROLE === 'admin') {
            document.getElementById('bbs-admin-actions').style.display = '';
          }
        } else {
          // token 无效，清理登录状态
          TOKEN = ''; USER = ''; USER_ID = ''; ROLE = '';
          localStorage.removeItem('bbs_token');
          localStorage.removeItem('bbs_user');
          localStorage.removeItem('bbs_user_id');
        }
        loadTopics();
      }).catch(function() {
        loadTopics();
      });
    } else {
      loadTopics();
    }
  }

  // ── 登录 ──

  window.bbsShowLogin = function() {
    hideLoginError();
    document.getElementById('bbs-login-user').value = '';
    document.getElementById('bbs-login-pass').value = '';
    document.getElementById('bbs-login-modal').style.display = '';
    setTimeout(function() { document.getElementById('bbs-login-user').focus(); }, 100);
  };

  window.bbsCloseLogin = function() {
    document.getElementById('bbs-login-modal').style.display = 'none';
  };

  window.bbsDoLogin = function() {
    var username = document.getElementById('bbs-login-user').value.trim();
    var password = document.getElementById('bbs-login-pass').value.trim();
    if (!username || !password) {
      showLoginError('请输入用户名和密码');
      return;
    }
    hideLoginError();
    api('POST', '/api/bbs/auth', { username: username, password: password })
      .then(function(res) {
        if (res.ok) {
          TOKEN = res.token;
          USER = res.user;
          USER_ID = res.user_id || '';
          ROLE = res.role || 'user';
          localStorage.setItem('bbs_token', TOKEN);
          localStorage.setItem('bbs_user', res.user);
          localStorage.setItem('bbs_user_id', res.user_id || '');
          location.reload();
        } else if (res.error === 'auth_failed') {
          showLoginError('用户名或密码错误');
        } else {
          showLoginError('登录失败，请重试');
        }
      })
      .catch(function() {
        showLoginError('网络错误，请重试');
      });
  };

  window.bbsLogout = function() {
    TOKEN = '';
    USER = '';
    USER_ID = '';
    ROLE = '';
    localStorage.removeItem('bbs_token');
    localStorage.removeItem('bbs_user');
    localStorage.removeItem('bbs_user_id');
    location.reload();
  };

  document.getElementById('bbs-login-modal').addEventListener('click', function(e) {
    if (e.target === this) bbsCloseLogin();
  });
  document.getElementById('bbs-login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') bbsDoLogin();
  });

  // ── 加载帖子列表 ──

  function loadTopics(page) {
    page = (page !== undefined) ? page : CURRENT_PAGE;
    CURRENT_PAGE = page;
    var container = document.getElementById('bbs-topic-list');
    container.innerHTML = '<div class="bbs-loading">加载中…</div>';
    var params = '?page=' + page + '&limit=' + PAGE_LIMIT;
    if (SEARCH_QUERY) {
      params += '&q=' + encodeURIComponent(SEARCH_QUERY);
    }
    api('GET', '/api/bbs/topics' + params).then(function(res) {
      if (res && res.topics) {
        TOTAL_TOPICS = res.total || 0;
        if (res.topics.length === 0 && page > 1 && TOTAL_TOPICS > 0) {
          loadTopics(1);
          return;
        }
        renderTopicList(res.topics);
      } else {
        container.innerHTML = '<div class="bbs-empty">加载失败</div>';
      }
    }).catch(function() {
      container.innerHTML = '<div class="bbs-empty">加载失败，请检查网络</div>';
    });
  }

  function renderTopicList(topics) {
    var container = document.getElementById('bbs-topic-list');
    var html = '';

    // 搜索栏
    html += '<div class="bbs-search-bar">' +
      '<input type="text" id="bbs-search-input" placeholder="搜索帖子标题…" value="' + escapeHtml(SEARCH_QUERY) + '" />' +
      '<button class="bbs-search-btn" onclick="bbsSearch()">搜索</button>' +
      '</div>';

    // 帖子列表
    if (!topics || topics.length === 0) {
      html += '<div class="bbs-empty">' + (SEARCH_QUERY ? '没有找到匹配的帖子' : '还没有帖子，点击右下角 + 发布第一条') + '</div>';
    } else {
      html += '<div class="bbs-topic-list">';
      for (var i = 0; i < topics.length; i++) {
        var t = topics[i];
        var time = new Date(t.created_at * 1000).toLocaleString();
        var aname = t.author_name || '账号不存在';
        var badges = authorBadges(t.author_id, t.author_role, t.author_tags);
        var preview = t.content_preview ? highlightText(t.content_preview, SEARCH_QUERY) : '';
        html += '<div class="bbs-topic-item" onclick="bbsOpenTopic(\'' + t.id + '\')">' +
          '<div class="bbs-topic-main">' +
          '<div class="bbs-topic-title">' + highlightText(t.title, SEARCH_QUERY) + '</div>' +
          (preview ? '<div class="bbs-topic-preview">' + preview + '</div>' : '') +
          '<div class="bbs-topic-meta">' +
          '<span class="bbs-author-link" onclick="event.stopPropagation();bbsOpenUser(\'' + escapeHtml(t.author_id || '') + '\')">' + highlightText(aname, SEARCH_QUERY) + '</span>' + badges +
          '<span>·</span>' +
          '<span>' + time + '</span>' +
          '</div></div>' +
          '<div class="bbs-topic-stats">' +
          '<span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ' + t.reply_count + '</span>' +
          '</div>' +
          (canDeleteTopic(t.author_id) ? '<button class="bbs-topic-delete-btn" onclick="event.stopPropagation();bbsDeleteTopic(\'' + t.id + '\')" title="删除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' : '') +
          '</div>';
      }
      html += '</div>';
    }

    // 分页 + 总数
    var totalPages = Math.max(1, Math.ceil(TOTAL_TOPICS / PAGE_LIMIT));
    html += '<div class="bbs-pagination">';
    if (totalPages > 1) {
      html += '<button class="bbs-page-btn" onclick="bbsGoToPage(' + (CURRENT_PAGE - 1) + ')"' + (CURRENT_PAGE <= 1 ? ' disabled' : '') + '>上一页</button>';
      var lastShown = 0;
      for (var i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= CURRENT_PAGE - 2 && i <= CURRENT_PAGE + 2)) {
          if (lastShown > 0 && i - lastShown > 1) {
            html += '<span class="bbs-page-dots">…</span>';
          }
          if (i === CURRENT_PAGE) {
            html += '<span class="bbs-page-btn current">' + i + '</span>';
          } else {
            html += '<button class="bbs-page-btn" onclick="bbsGoToPage(' + i + ')">' + i + '</button>';
          }
          lastShown = i;
        }
      }
      html += '<button class="bbs-page-btn" onclick="bbsGoToPage(' + (CURRENT_PAGE + 1) + ')"' + (CURRENT_PAGE >= totalPages ? ' disabled' : '') + '>下一页</button>';
    }
    html += '<span class="bbs-page-info">共 ' + TOTAL_TOPICS + ' 条</span>';
    html += '</div>';

    container.innerHTML = html;

    // 绑定搜索框回车
    var si = document.getElementById('bbs-search-input');
    if (si) {
      si.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); bbsSearch(); }
      });
      if (SEARCH_QUERY) si.focus();
    }
  }

  function canDeleteTopic(authorId) {
    if (!TOKEN) return false;
    if (ROLE === 'admin') return true;
    return USER_ID === authorId;
  }

  window.bbsSearch = function() {
    var q = document.getElementById('bbs-search-input').value.trim();
    SEARCH_QUERY = q;
    loadTopics(1);
  };

  window.bbsGoToPage = function(page) {
    if (page < 1) return;
    loadTopics(page);
  };

  // ── 打开帖子详情 ──

  window.bbsOpenTopic = function(id) {
    history.pushState({ topic: id }, '', '?topic=' + id);
    api('GET', '/api/bbs/topics/' + id).then(function(topic) {
      if (topic && topic.id) {
        renderDetail(topic);
      } else {
        showToast('帖子不存在或已被删除');
        loadTopics();
      }
    });
  };

  function renderDetail(topic) {
    var listEl = document.getElementById('bbs-topic-list');
    var detailEl = document.getElementById('bbs-detail');
    listEl.style.display = 'none';
    detailEl.style.display = '';

    var time = new Date(topic.created_at * 1000).toLocaleString();
    var authorName = topic.author_name || '账号不存在';
    var topicBadges = authorBadges(topic.author_id, topic.author_role, topic.author_tags);
    var replies = topic.replies || [];
    var repliesHtml = '';
    for (var i = 0; i < replies.length; i++) {
      var r = replies[i];
      var rt = new Date(r.created_at * 1000).toLocaleString();
      var rAuthor = r.author_name || '账号不存在';
      var rBadges = authorBadges(r.author_id, r.author_role, r.author_tags);
      if (topic.author_id && r.author_id && r.author_id === topic.author_id) {
        rBadges += '<span class="bbs-role-badge author">贴主</span>';
      }
      var canDelReply = TOKEN && (ROLE === 'admin' || r.author_id === USER_ID);
      var delBtn = canDelReply ? '<span class="bbs-reply-del" onclick="bbsDeleteReply(\'' + topic.id + '\',\'' + (r.id || '') + '\')" title="删除"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></span>' : '';
      repliesHtml += '<div class="bbs-reply-item">' +
        '<div class="bbs-reply-author"><span class="bbs-author-link" onclick="bbsOpenUser(\'' + escapeHtml(r.author_id || '') + '\')">' + escapeHtml(rAuthor) + '</span>' + rBadges + '</div>' +
        delBtn +
        '<div class="bbs-reply-content">' + escapeHtml(r.content) + '</div>' +
        '<div class="bbs-reply-time">' + rt + '</div>' +
        '</div>';
    }

    // 回复输入区域（登录后可见）
    var replyInputHtml = '';
    if (TOKEN) {
      replyInputHtml =
        '<div class="bbs-reply-input-area">' +
        '<textarea id="bbs-reply-content" placeholder="输入回复…"></textarea>' +
        '<div class="bbs-reply-submit-wrap">' +
        '<button class="bbs-reply-submit" onclick="bbsDoReply(\'' + topic.id + '\')">回复</button>' +
        '</div></div>';
    } else {
      replyInputHtml =
        '<div class="bbs-reply-input-area" style="text-align:center;color:#bbb;font-size:13px;">' +
        '登录后可以回复' +
        '</div>';
    }

    detailEl.innerHTML =
      '<div class="bbs-detail">' +
      '<div class="bbs-detail-header">' +
      '<button class="bbs-detail-back" onclick="bbsCloseDetail()">← 返回列表</button>' +
      '<div class="bbs-detail-title">' + escapeHtml(topic.title) + '</div>' +
      '<div class="bbs-detail-meta">' +
      '<span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <span class="bbs-author-link" onclick="event.stopPropagation();bbsOpenUser(\'' + escapeHtml(topic.author_id || '') + '\')">' + escapeHtml(topic.author_name || '账号不存在') + '</span>' + topicBadges + '</span>' +
      '<span>' + time + '</span>' +
      '<span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ' + replies.length + ' 条回复</span>' +
      '</div></div>' +
      '<div class="bbs-detail-content">' + renderMarkdown(topic.content) + '</div>' +
      '<div class="bbs-reply-section">' +
      '<h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>回复</h3>' +
      (repliesHtml || '<div style="color:#bbb;font-size:13px;padding:8px 0;">暂无回复</div>') +
      '</div>' +
      replyInputHtml +
      '</div>';

    // 键盘快捷键：回车回复
    var replyInput = document.getElementById('bbs-reply-content');
    if (replyInput) {
      replyInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          document.querySelector('.bbs-reply-submit').click();
        }
      });
      setTimeout(function() { replyInput.focus(); }, 200);
    }
  }

  window.bbsCloseDetail = function() {
    history.pushState({ list: true }, '', window.location.pathname);
    document.getElementById('bbs-detail').style.display = 'none';
    document.getElementById('bbs-topic-list').style.display = '';
    loadTopics(CURRENT_PAGE);
  };

  // ── 用户主页 ──

  window.bbsOpenUser = function(uid) {
    if (!uid) { showToast('用户不存在'); return; }
    history.pushState({ user: uid }, '', '?user=' + uid);
    var listEl = document.getElementById('bbs-topic-list');
    var detailEl = document.getElementById('bbs-detail');
    listEl.style.display = 'none';
    detailEl.style.display = '';
    detailEl.innerHTML = '<div class="bbs-loading">加载中…</div>';
    api('GET', '/api/bbs/user/' + uid).then(function(res) {
      if (res && res.ok) {
        var roleLabel = res.role === 'admin' ? '管理员' : '用户';
        var badgesHtml = '<span class="bbs-role-badge ' + res.role + '">' + roleLabel + '</span>';
        if (res.tags && res.tags.length > 0) {
          for (var ti = 0; ti < res.tags.length; ti++) {
            badgesHtml += '<span class="bbs-role-badge custom">' + escapeHtml(res.tags[ti]) + '</span>';
          }
        }
        var html = '<div class="bbs-detail">' +
          '<div class="bbs-detail-header">' +
          '<button class="bbs-detail-back" onclick="bbsCloseDetail()">← 返回列表</button>' +
          '<div class="bbs-detail-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px;margin-right:6px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' + escapeHtml(res.username) + ' ' + badgesHtml + '</div>' +
          '<div class="bbs-detail-meta">' +
          '<span>ID ' + escapeHtml(res.user_id) + '</span>' +
          '<span>' + res.topic_count + ' 个帖子</span>' +
          '</div></div>';
        // 帖子列表
        if (res.topics && res.topics.length > 0) {
          html += '<div class="bbs-reply-section"><h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>帖子</h3></div>';
          for (var i = 0; i < res.topics.length; i++) {
            var t = res.topics[i];
            var preview = t.content_preview ? escapeHtml(t.content_preview) : '';
            html += '<div class="bbs-topic-item" onclick="bbsOpenTopic(\'' + t.id + '\')">' +
              '<div class="bbs-topic-main">' +
              '<div class="bbs-topic-title">' + escapeHtml(t.title) + '</div>' +
              (preview ? '<div class="bbs-topic-preview">' + preview + '</div>' : '') +
              '<div class="bbs-topic-meta"><span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ' + t.reply_count + '</span></div>' +
              '</div></div>';
          }
        } else {
          html += '<div style="color:#bbb;text-align:center;padding:32px;font-size:14px;">暂无帖子</div>';
        }
        html += '</div>';
        detailEl.innerHTML = html;
      } else {
        detailEl.innerHTML = '<div class="bbs-detail">' +
          '<button class="bbs-detail-back" onclick="bbsCloseDetail()">← 返回列表</button>' +
          '<div style="text-align:center;padding:48px;color:#bbb;">👤 用户不存在</div></div>';
      }
    }).catch(function() {
      detailEl.innerHTML = '<div class="bbs-detail">' +
        '<button class="bbs-detail-back" onclick="bbsCloseDetail()">← 返回列表</button>' +
        '<div style="text-align:center;padding:48px;color:#bbb;">加载失败</div></div>';
    });
  };

  // ── Markdown 简单渲染 ──

  function renderMarkdown(text) {
    if (!text) return '';
    var html = escapeHtml(text);
    // 代码块
    html = html.replace(/```([\s\S]*?)```/g, function(m, c) {
      return '<pre><code>' + c.trim() + '</code></pre>';
    });
    // 行内代码
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // 标题
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // 加粗
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // 斜体
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // 链接
    html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
    // 换行
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  // ── 回复 ──

  window.bbsDoReply = function(topicId) {
    var input = document.getElementById('bbs-reply-content');
    var content = input.value.trim();
    if (!content) { showToast('请输入回复内容'); return; }
    var btn = document.querySelector('.bbs-reply-submit');
    btn.disabled = true; btn.textContent = '提交中…';
    api('POST', '/api/bbs/topics/' + topicId + '/reply', { content: content })
      .then(function(res) {
        if (res.ok) {
          input.value = '';
          showToast('回复成功');
          bbsOpenTopic(topicId);
        } else if (res.error === 'unauthorized') {
          handleUnauthorized();
        } else {
          showToast('回复失败');
        }
      })
      .catch(function() { showToast('网络错误'); })
      .finally(function() { btn.disabled = false; btn.textContent = '回复'; });
  };

  // ── 删除帖子 ──

  window.bbsDeleteReply = function(topicId, replyId) {
    if (!replyId || !confirm('确定删除这条回复吗？')) return;
    api('POST', '/api/bbs/topics/' + topicId + '/reply-delete', { reply_id: replyId })
      .then(function(res) {
        if (res.ok) {
          showToast('回复已删除');
          bbsOpenTopic(topicId);
        } else if (res.error === 'unauthorized') {
          handleUnauthorized();
        } else if (res.error === 'forbidden') {
          showToast('无权删除');
        } else {
          showToast('删除失败');
        }
      });
  };

  window.bbsDeleteTopic = function(id) {
    if (!confirm('确定删除这个帖子吗？')) return;
    api('POST', '/api/bbs/topics/' + id + '/delete')
      .then(function(res) {
        if (res.ok) {
          showToast('已删除');
          loadTopics();
        } else if (res.error === 'unauthorized') {
          handleUnauthorized();
        } else if (res.error === 'forbidden') {
          showToast('无权删除此帖子');
        } else {
          showToast('删除失败');
        }
      });
  };

  // ── 数据导入导出 ──

  window.bbsExport = function() {
    var url = '/api/bbs/export';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.setRequestHeader('X-Auth-Token', TOKEN);
    xhr.responseType = 'blob';
    xhr.onload = function() {
      if (xhr.status === 200) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(xhr.response);
        a.download = 'bbs-backup.zip';
        a.click();
        showToast('导出成功');
      } else {
        showToast('导出失败：' + (xhr.status === 403 ? '无权限' : '服务器错误'));
      }
    };
    xhr.onerror = function() { showToast('导出失败'); };
    xhr.send();
  };

  document.getElementById('bbs-import-input').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    if (!confirm('确定导入数据？这将覆盖全部现有论坛数据。')) { this.value = ''; return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/bbs/import', true);
      xhr.setRequestHeader('Content-Type', 'application/octet-stream');
      xhr.setRequestHeader('X-Auth-Token', TOKEN);
      xhr.responseType = 'json';
      xhr.onload = function() {
        if (xhr.response && xhr.response.ok) {
          showToast('导入成功');
          loadTopics();
        } else if (xhr.status === 403) {
          showToast('无权限');
        } else {
          showToast('导入失败');
        }
      };
      xhr.onerror = function() { showToast('导入失败'); };
      xhr.send(e.target.result);
    };
    reader.readAsArrayBuffer(file);
    this.value = '';
  });

  // ── 发帖弹窗 ──

  window.bbsShowPost = function() {
    if (!TOKEN) { bbsShowLogin(); return; }
    document.getElementById('bbs-post-title').value = '';
    document.getElementById('bbs-post-content').value = '';
    document.getElementById('bbs-post-modal').style.display = '';
    setTimeout(function() { document.getElementById('bbs-post-title').focus(); }, 100);
  };

  window.bbsClosePost = function() {
    document.getElementById('bbs-post-modal').style.display = 'none';
  };

  window.bbsDoPost = function() {
    var title = document.getElementById('bbs-post-title').value.trim();
    var content = document.getElementById('bbs-post-content').value.trim();
    if (!title) { showToast('请输入标题'); return; }
    if (!content) { showToast('请输入内容'); return; }
    var btn = document.querySelector('#bbs-post-modal .bbs-post-submit-btn');
    btn.disabled = true; btn.textContent = '发布中…';
    api('POST', '/api/bbs/topics', { title: title, content: content })
      .then(function(res) {
        if (res.ok) {
          document.getElementById('bbs-post-modal').style.display = 'none';
          showToast('发布成功');
          loadTopics();
        } else if (res.error === 'unauthorized') {
          handleUnauthorized();
        } else {
          showToast('发布失败');
        }
      })
      .catch(function() { showToast('网络错误'); })
      .finally(function() { btn.disabled = false; btn.textContent = '发布'; });
  };

  document.getElementById('bbs-post-title').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('bbs-post-content').focus();
    }
  });

  // ── 浏览器前进/后退 ──
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.topic) {
      bbsOpenTopic(e.state.topic);
    } else if (e.state && e.state.user) {
      bbsOpenUser(e.state.user);
    } else if (document.getElementById('bbs-detail').style.display !== 'none') {
      document.getElementById('bbs-detail').style.display = 'none';
      document.getElementById('bbs-topic-list').style.display = '';
      loadTopics();
    }
  });

  // ── 从 URL 参数打开帖子 ──
  (function() {
    var p = new URLSearchParams(window.location.search);
    var tid = p.get('topic');
    var uid = p.get('user');
    var target = tid || uid;
    if (target) {
      var checkLoaded = setInterval(function() {
        var el = document.getElementById('bbs-topic-list');
        if (el && el.innerHTML.indexOf('bbs-topic-item') !== -1) {
          clearInterval(checkLoaded);
          if (tid) bbsOpenTopic(tid);
          else bbsOpenUser(uid);
        }
      }, 100);
      setTimeout(function() { clearInterval(checkLoaded); }, 10000);
    }
  })();

  // ── 启动 ──
  detectBackend();
})();
</script>

<!-- 悬浮发帖按钮 -->
<button class="bbs-fab" id="bbs-fab" onclick="bbsShowPost()" title="发布帖子"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
