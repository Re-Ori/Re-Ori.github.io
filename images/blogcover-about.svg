<svg xmlns="http://www.w3.org/2000/svg" width="968" height="160" viewBox="0 0 968 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#399FFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#399FFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="968" height="160" fill="url(#bg)"/>
  <rect width="300" height="160" fill="url(#glow)"/>

  <!-- 行号列 -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="11" opacity="0.5">
    <text x="40" y="28" fill="#8b949e">1</text>
    <text x="40" y="46" fill="#8b949e">2</text>
    <text x="40" y="64" fill="#8b949e">3</text>
    <text x="40" y="82" fill="#8b949e">4</text>
    <text x="40" y="100" fill="#8b949e">5</text>
    <text x="40" y="118" fill="#8b949e">6</text>
    <text x="40" y="136" fill="#8b949e">7</text>
    <text x="40" y="154" fill="#8b949e">8</text>
  </g>

  <!-- 行号分隔线 -->
  <line x1="50" y1="20" x2="50" y2="154" stroke="#399FFF" stroke-width="1" stroke-opacity="0.1"/>

  <!-- 代码内容 -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="11">
    <text x="68" y="28"><tspan fill="#a5d6ff">#include</tspan><tspan fill="#a5d6ff"> &lt;bits/stdc++.h&gt;</tspan></text>
    <text x="68" y="46" fill="#c9d1d9"><tspan fill="#ff7b72">using</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#ff7b72">namespace</tspan><tspan fill="#c9d1d9"> std;</tspan></text>
    <text x="68" y="64"><tspan fill="#ff7b72">long</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#ff7b72">long</tspan><tspan fill="#c9d1d9"> n,m,</tspan><tspan fill="#79c0ff">dp</tspan><tspan fill="#c9d1d9">[</tspan><tspan fill="#79c0ff">1024</tspan><tspan fill="#c9d1d9">];</tspan></text>
    <text x="68" y="82"><tspan fill="#ff7b72">int</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#d2a8ff">main</tspan><tspan fill="#c9d1d9">(){</tspan></text>
    <text x="84" y="100"><tspan fill="#79c0ff">dp</tspan><tspan fill="#c9d1d9">[</tspan><tspan fill="#79c0ff">0</tspan><tspan fill="#c9d1d9">]=</tspan><tspan fill="#79c0ff">42</tspan><tspan fill="#c9d1d9">; </tspan><tspan fill="#8b949e">//Hello,World!</tspan></text>
    <text x="84" y="118"><tspan fill="#79c0ff">cin</tspan><tspan fill="#c9d1d9">&gt;&gt;n&gt;&gt;m;</tspan></text>
    <text x="84" y="136"><tspan fill="#ff7b72">for</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#ff7b72">int</tspan><tspan fill="#c9d1d9"> i=</tspan><tspan fill="#79c0ff">1</tspan><tspan fill="#c9d1d9">;i&lt;=n;i</tspan><tspan fill="#ff7b72">++</tspan><tspan fill="#c9d1d9">){</tspan></text>
    <text x="100" y="154"><tspan fill="#79c0ff">dp</tspan><tspan fill="#c9d1d9">[i]=</tspan><tspan fill="#79c0ff">dp</tspan><tspan fill="#c9d1d9">[i-</tspan><tspan fill="#79c0ff">1</tspan><tspan fill="#c9d1d9">]*</tspan><tspan fill="#79c0ff">2</tspan><tspan fill="#c9d1d9">+m;</tspan></text>
  </g>

  <!-- 光标 -->
  <rect x="240" y="90" width="5" height="11" rx="1" fill="#399FFF" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.0;0.0;0.0;0.7;0.7;0.7;0.7" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- 底部主题色条 -->
  <rect y="156" width="968" height="4" fill="#399FFF" rx="2"/>
</svg>
