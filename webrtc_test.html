<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>WebRTC 诊断测试</title>
<style>
body { font-family: monospace; padding: 20px; background: #111; color: #ddd; }
pre { background: #222; padding: 12px; border-radius: 6px; min-height: 200px; }
button { padding: 8px 20px; font-size: 16px; cursor: pointer; background: #399FFF; color: #fff; border: none; border-radius: 6px; }
.fail { color: #ff6b6b; }
.pass { color: #51cf66; }
</style>
</head><body>
<h2>🔍 WebRTC 本地回环诊断</h2>
<p>在同一页面内创建两个 RTCPeerConnection 直接相连。<br>
如果下面显示 ✅ 连接成功，说明你浏览器 WebRTC 正常。否则说明浏览器/网络有问题。</p>
<button onclick="runTest()">运行测试</button>
<pre id="log">点击按钮运行…</pre>

<script>
const log = document.getElementById('log');
function out(msg, cls) {
  log.innerHTML += `<div class="${cls || ''}">${msg}</div>`;
}

async function runTest() {
  log.innerHTML = '';
  out('=== WebRTC 回环测试开始 ===');

  try {
    // 创建两个 PeerConnection
    const pc1 = new RTCPeerConnection({ iceServers: [] });  // 无 STUN
    const pc2 = new RTCPeerConnection({ iceServers: [] });
    out('✅ PC1 和 PC2 已创建');

    // 跟踪状态
    let pc1Connected = false, pc2Connected = false;
    let channelOpened = false;

    pc1.oniceconnectionstatechange = () => out(`PC1 ICE: ${pc1.iceConnectionState}`, pc1.iceConnectionState === 'connected' ? 'pass' : '');
    pc2.oniceconnectionstatechange = () => out(`PC2 ICE: ${pc2.iceConnectionState}`, pc2.iceConnectionState === 'connected' ? 'pass' : '');
    pc1.onconnectionstatechange = () => out(`PC1 Conn: ${pc1.connectionState}`, pc1.connectionState === 'connected' ? 'pass' : '');
    pc2.onconnectionstatechange = () => out(`PC2 Conn: ${pc2.connectionState}`, pc2.connectionState === 'connected' ? 'pass' : '');

    // ICE 候选交换
    pc1.onicecandidate = (e) => { if (e.candidate) pc2.addIceCandidate(new RTCIceCandidate(e.candidate.toJSON())); };
    pc2.onicecandidate = (e) => { if (e.candidate) pc1.addIceCandidate(new RTCIceCandidate(e.candidate.toJSON())); };

    // PC1 创建 DataChannel
    const ch = pc1.createDataChannel('test', { negotiated: true, id: 0 });
    ch.onopen = () => { channelOpened = true; out('✅ DataChannel 已打开!', 'pass'); };
    ch.onclose = () => out('❌ DataChannel 已关闭', 'fail');
    ch.onerror = (e) => out('❌ DataChannel 错误: ' + JSON.stringify(e), 'fail');
    out('✅ PC1 DataChannel 已创建');

    // PC2 也创建同样 negotiated channel
    const ch2 = pc2.createDataChannel('test', { negotiated: true, id: 0 });
    ch2.onopen = () => out('✅ PC2 DataChannel 已打开!', 'pass');
    ch2.onmessage = (e) => out(`PC2 收到: ${e.data}`);
    out('✅ PC2 DataChannel 已创建');

    // PC1 发 offer
    const offer = await pc1.createOffer();
    await pc1.setLocalDescription(offer);
    out('✅ PC1 offer 已创建');

    await pc2.setRemoteDescription(new RTCSessionDescription(offer));
    out('✅ PC2 已接收 offer');

    const answer = await pc2.createAnswer();
    await pc2.setLocalDescription(answer);
    out('✅ PC2 answer 已创建');

    await pc1.setRemoteDescription(new RTCSessionDescription(answer));
    out('✅ PC1 已接收 answer');

    // 等连接建立（超时 15s）
    await new Promise((resolve, reject) => {
      let waited = 0;
      const timer = setInterval(() => {
        waited += 500;
        if (channelOpened) { clearInterval(timer); resolve(); }
        else if (waited > 15000) { clearInterval(timer); reject(new Error('超时')); }
        else out(`⏳ 等待中... ${waited/1000}s (PC1: ${pc1.iceConnectionState}, PC2: ${pc2.iceConnectionState})`);
      }, 500);
    });

    // 发一条消息验证
    ch.send('Hello WebRTC!');
    out('✅ 消息已发送!', 'pass');
    out('');
    out('=== 测试完成 ===', 'pass');

    // 清理
    setTimeout(() => { ch.close(); ch2.close(); pc1.close(); pc2.close(); }, 1000);

  } catch (e) {
    out(`❌ 错误: ${e.message}`, 'fail');
    out(`❌ Stack: ${e.stack}`, 'fail');
  }
}
</script>
</body></html>
