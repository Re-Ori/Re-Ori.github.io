<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.6.0 20260621 更新</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="blog-content">
            <h2>1.6.0 20260621 更新</h2>
            <p>1. 文件存储支持多选管理，开启批量模式后可多选文件进行删除、移动、打包下载</p>
            <p>2. 新增移动功能，支持将文件/文件夹移动到任意目录</p>
            <p>3. 新增重命名功能，支持对文件/文件夹直接重命名</p>
            <p>4. 上传队列支持取消，正在上传或排队的任务可随时中止</p>
            <p>5. 管理面板重构，左侧用户列表以文件夹树形式展示，操作更直观</p>
            <p>6. 文件列表支持按名称/时间顺序/倒序排序</p>
            <p>7. 文件存储内置登录，不再跳转到论坛页面，登录状态与论坛同步</p>
            <p>8. 支持下载当前目录为 ZIP 文件，根目录亦可打包下载</p>
            <p>9. 根目录支持创建分享链接</p>
            <p>10. 上传完成后自动刷新列表</p>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>window.__navActive = ["更新日志"];</script>
    <script src="/js/navbar.js"></script>
    <script src="/js/giscus/giscus.js"></script>
    <script src="/js/bg.js"></script>
</body>
</html>
