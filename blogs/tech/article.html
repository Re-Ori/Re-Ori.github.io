          <h2>什么是动态规划</h2>
          <p>动态规划（Dynamic Programming，DP）是一种通过将原问题分解为相对简单的子问题来求解复杂问题的方法。核心思想是：<strong>最优子结构</strong> + <strong>重叠子问题</strong>。</p>

          <h2>经典模型：斐波那契数列</h2>
          <p>斐波那契数列是最简单的 DP 入门题：</p>
          <pre><code>int fib(int n) {
    if (n <= 1) return n;
    return fib(n-1) + fib(n-2);
}</code></pre>
          <p>直接递归存在大量重复计算，用 DP 数组优化：</p>
          <pre><code>int fib(int n) {
    int dp[100] = {0};
    dp[0] = 0; dp[1] = 1;
    for (int i = 2; i <= n; i++)
        dp[i] = dp[i-1] + dp[i-2];
    return dp[n];
}</code></pre>

          <h2>0/1 背包问题</h2>
          <p>有 N 个物品，每个物品有重量 w[i] 和价值 v[i]。背包容量为 W，求能装入的最大价值。</p>
          <pre><code>int dp[1005] = {0};
for (int i = 1; i <= N; i++)
    for (int j = W; j >= w[i]; j--)
        dp[j] = max(dp[j], dp[j - w[i]] + v[i]);
// 答案：dp[W]</code></pre>
          <p>内层循环倒序是关键——保证每个物品只选一次。</p>

          <h2>DP 解题步骤</h2>
          <ul>
            <li><strong>定义状态</strong>：dp[i] 表示什么含义</li>
            <li><strong>状态转移方程</strong>：如何从子问题推出当前问题</li>
            <li><strong>初始化</strong>：边界条件</li>
            <li><strong>遍历顺序</strong>：确定计算顺序</li>

          <h2>单源最短路：Dijkstra</h2>
          <p>适用于边权非负的图，使用优先队列优化后复杂度 O((V+E)logV)。</p>
          <pre><code>vector&lt;pair&lt;int,int&gt;&gt; g[100005];
int dist[100005];
void dijkstra(int s) {
    memset(dist, 0x3f, sizeof(dist));
    priority_queue&lt;pair&lt;int,int&gt;, vector&lt;&gt;, greater&lt;&gt;&gt; pq;
    dist[s] = 0; pq.push({0, s});
    while (!pq.empty()) {
        auto [d, u] = pq.top(); pq.pop();
        if (d > dist[u]) continue;
        for (auto [v, w] : g[u])
            if (dist[v] > dist[u] + w)
                dist[v] = dist[u] + w, pq.push({dist[v], v});
    }
}</code></pre>

          <pre><code>for (int k = 1; k <= n; k++)
    for (int i = 1; i <= n; i++)

            dist[i][j] = min(dist[i][j], dist[i][k] + dist[k][j]);</code></pre>

const int P = 131;
ull h[100005], p[100005];
void init(string &s) {
    p[0] = 1;
    for (int i = 1; i <= s.size(); i++) {
        h[i] = h[i-1] * P + s[i-1];
        p[i] = p[i-1] * P;

void build(string &p) {

        if (p[i] == p[j]) j++;

void add(int i, int x) {

    int s = 0;

          <h2>线段树（区间加 + 区间求和）</h2>
          <pre><code>struct SegTree {
    ll sum[400005], tag[400005];
    void push(int p, int l, int r) {
        if (!tag[p]) return;
        int mid = (l + r) >> 1, lc = p<<1, rc = p<<1|1;
        sum[lc] += tag[p] * (mid - l + 1);
        sum[rc] += tag[p] * (r - mid);
        tag[lc] += tag[p]; tag[rc] += tag[p];
        tag[p] = 0;
    }
    void add(int p, int l, int r, int ql, int qr, ll v) {
        if (ql <= l && r <= qr) { sum[p] += v * (r-l+1); tag[p] += v; return; }
        push(p, l, r);
        int mid = (l + r) >> 1;
        if (ql <= mid) add(p<<1, l, mid, ql, qr, v);
        if (qr > mid) add(p<<1|1, mid+1, r, ql, qr, v);
        sum[p] = sum[p<<1] + sum[p<<1|1];
    }
    ll query(int p, int l, int r, int ql, int qr) {
        if (ql <= l && r <= qr) return sum[p];
        push(p, l, r);
        int mid = (l + r) >> 1; ll res = 0;
        if (ql <= mid) res += query(p<<1, l, mid, ql, qr);
        if (qr > mid) res += query(p<<1|1, mid+1, r, ql, qr);
        return res;
    }
};</code></pre>

    if (l == r) { sum[p]++; return; }
    int mid = l + r >> 1;
    if (x <= mid) add(p<<1, l, mid, x);
    else add(p<<1|1, mid+1, r, x);
    sum[p] = sum[p<<1] + sum[p<<1|1];

    int mid = l + r >> 1;

    if (l >= r) return;

        while (a[j] > p) j--;

    while (i <= mid) tmp[k++] = a[i++];
    while (j <= r) tmp[k++] = a[j++];
    for (i = l; i <= r; i++) a[i] = tmp[i];
}</code></pre>
          <p>逆序对计数：在合并时，若 a[i] > a[j]，则 a[i..mid] 都与 a[j] 构成逆序对，累加 mid-i+1。</p>

          <h2>堆排序</h2>
          <p>利用大根堆每次取出最大值。也可直接用 priority_queue。</p>

          <h2>快速选择（第 k 大）</h2>
          <p>利用快排的划分思想，平均 O(N)。</p>
          <pre><code>int quick_select(int a[], int l, int r, int k) {
    if (l == r) return a[l];
    int i = l - 1, j = r + 1, p = a[l + r >> 1];
    while (i < j) {
        while (a[++i] < p);
        while (a[--j] > p);
        if (i < j) swap(a[i], a[j]);
    }
    int left_len = j - l + 1;
    if (k <= left_len) return quick_select(a, l, j, k);
    return quick_select(a, j + 1, r, k - left_len);
}</code></pre>

          <h2>递归三要素</h2>
          <ul>
            <li><strong>终止条件</strong>：最简单的 case 直接返回</li>
            <li><strong>递归调用</strong>：缩小问题规模</li>

          </ul>

          <h2>经典分治：归并求逆序对</h2>
          <pre><code>long long merge_count(int a[], int l, int r) {
    if (l >= r) return 0;
    int mid = l + r >> 1;
    long long ans = merge_count(a, l, mid)
                  + merge_count(a, mid+1, r);
    int i = l, j = mid+1, k = l;
    while (i <= mid && j <= r)
        if (a[i] <= a[j]) tmp[k++] = a[i++];
        else ans += mid - i + 1, tmp[k++] = a[j++];
    while (i <= mid) tmp[k++] = a[i++];
    while (j <= r) tmp[k++] = a[j++];
    for (i = l; i <= r; i++) a[i] = tmp[i];
    return ans;
}</code></pre>

          <h2>快速幂（分治思想）</h2>
          <pre><code>long long qpow(long long a, long long b, long long m) {
    long long r = 1;
    while (b) {
        if (b & 1) r = r * a % m;
        a = a * a % m; b >>= 1;
    }
    return r;
}</code></pre>

          <h2>平面最近点对（分治）</h2>
          <p>按 x 坐标排序后分治，合并时检查分界线两侧 2d 范围内的点，按 y 排序后暴力检查。</p>
          <pre><code>double closest(vector&lt;pair&lt;int,int&gt;&gt; &p, int l, int r) {
    if (l >= r) return INF;
    int mid = l + r >> 1;
    int midx = p[mid].first;
    double d = min(closest(p, l, mid), closest(p, mid+1, r));
    vector&lt;pair&lt;int,int&gt;&gt; strip;
    for (int i = l; i <= r; i++)
        if (abs(p[i].first - midx) < d)
            strip.push_back(p[i]);
    sort(strip.begin(), strip.end(), [](auto a, auto b) { return a.second < b.second; });
    for (int i = 0; i < strip.size(); i++)
        for (int j = i + 1; j < strip.size() && strip[j].second - strip[i].second < d; j++)
            d = min(d, hypot(strip[i].first - strip[j].first, strip[i].second - strip[j].second));
    return d;
}</code></pre>
