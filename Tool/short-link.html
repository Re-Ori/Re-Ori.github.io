<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短链生成器 — Origin Base</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* 环境检测遮罩 */
    .sl-detect-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px); display: flex; align-items: center;
      justify-content: center; z-index: 200;
    }
    [data-theme="dark"] .sl-detect-overlay { background: rgba(26,27,46,0.95); }
    .sl-detect-box { text-align: center; padding: 40px; max-width: 400px; }
    .sl-detect-box h2 { font-size: 22px; margin-bottom: 8px; color: #1a1a1a; }
    [data-theme="dark"] .sl-detect-box h2 { color: #e0e0e0; }
    .sl-detect-box p { font-size: 14px; color: #8e8e93; margin-bottom: 24px; }
    .sl-detect-spinner {
      width: 40px; height: 40px; border: 3px solid rgba(57,159,255,0.2);
      border-top-color: var(--theme-color,#399FFF); border-radius: 50%;
      animation: sl-spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes sl-spin { to { transform: rotate(360deg); } }
    .sl-detect-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; background: var(--theme-color,#399FFF);
      color: #fff; transition: opacity 0.2s;
    }

    /* 顶栏 */
    .sl-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px; border-bottom: 1px solid rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    [data-theme="dark"] .sl-header { border-color: rgba(255,255,255,0.06); }
    .sl-header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    [data-theme="dark"] .sl-header h1 { color: #e0e0e0; }
    .sl-user { display: flex; align-items: center; gap: 10px; }
    .sl-login-btn {
      padding: 6px 16px; border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px; font-size: 13px; background: transparent;
      cursor: pointer; color: #555; transition: all 0.15s;
    }
    .sl-login-btn:hover { border-color: var(--theme-color,#399FFF); color: var(--theme-color,#399FFF); }
    [data-theme="dark"] .sl-login-btn { color: #aaa; border-color: rgba(255,255,255,0.15); }
    .sl-badge {
      font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px;
    }
    [data-theme="dark"] .sl-badge { color: #aaa; }
    .sl-logout {
      font-size: 12px; color: #999; cursor: pointer; background: none; border: none; padding: 2px 6px;
    }
    .sl-logout:hover { color: #ff3b30; }

    /* 主体 */
    .sl-body { max-width: 640px; margin: 0 auto; }

    /* 输入区 */
    .sl-input-card {
      background: #fff; border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px; padding: 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04); margin-bottom: 16px;
    }
    [data-theme="dark"] .sl-input-card {
      background: #1c1c1e; border-color: rgba(255,255,255,0.06);
      box-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }
    .sl-input-card label {
      display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px;
    }
    [data-theme="dark"] .sl-input-card label { color: #888; }
    .sl-row { display: flex; gap: 10px; }
    .sl-row input {
      flex: 1; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 10px; font-size: 14px; background: rgba(255,255,255,0.8);
      color: #333; outline: none; transition: border-color 0.2s;
    }
    [data-theme="dark"] .sl-row input {
      background: rgba(40,42,65,0.8); border-color: rgba(255,255,255,0.1); color: #ddd;
    }
    .sl-row input:focus { border-color: var(--theme-color,#399FFF); }
    .sl-row input::placeholder { color: #bbb; }
    .sl-gen-btn {
      padding: 12px 28px; border: none; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; background: var(--theme-color,#399FFF);
      color: #fff; white-space: nowrap; transition: opacity 0.2s; flex-shrink: 0;
    }
    .sl-gen-btn:hover { opacity: 0.85; }
    .sl-gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 错误提示 */
    .sl-err { color: #ff3b30; font-size: 12px; margin-top: 8px; display: none; }
    .sl-err.show { display: block; }

    /* 结果 */
    .sl-result {
      margin-top: 16px; padding: 14px 18px;
      background: rgba(57,159,255,0.05); border: 1px solid rgba(57,159,255,0.12);
      border-radius: 12px; display: none;
    }
    .sl-result.show { display: block; }
    .sl-result small { font-size: 11px; color: #8e8e93; display: block; margin-bottom: 6px; }
    .sl-result a {
      font-size: 14px; color: var(--theme-color,#399FFF); font-weight: 600;
      text-decoration: none; word-break: break-all; cursor: pointer;
    }
    .sl-result a:hover { text-decoration: underline; }

    /* 列表 */
    .sl-list-card {
      background: #fff; border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
    }
    [data-theme="dark"] .sl-list-card {
      background: #1c1c1e; border-color: rgba(255,255,255,0.06);
      box-shadow: 0 2px 16px rgba(0,0,0,0.15);
    }
    .sl-list-header {
      padding: 20px 24px 0; font-size: 13px; font-weight: 600; color: #555;
    }
    [data-theme="dark"] .sl-list-header { color: #888; }
    .sl-empty {
      text-align: center; padding: 48px 24px; color: #bbb; font-size: 14px;
    }
    [data-theme="dark"] .sl-empty { color: #555; }
    .sl-item {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 24px; font-size: 13px; border-top: 1px solid rgba(0,0,0,0.03);
      transition: background 0.1s;
    }
    .sl-item:first-child { border-top: none; }
    .sl-item:hover { background: rgba(0,0,0,0.02); }
    [data-theme="dark"] .sl-item { border-color: rgba(255,255,255,0.03); }
    [data-theme="dark"] .sl-item:hover { background: rgba(255,255,255,0.02); }
    .sl-code {
      font-family: 'SF Mono', 'Consolas', monospace;
      color: var(--theme-color,#399FFF); font-weight: 600; font-size: 12px;
      flex-shrink: 0; min-width: 70px;
    }
    .sl-expiry {
      font-size: 11px; color: #e67e22; font-weight: 500; flex-shrink: 0;
    }
    .sl-url {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: #8e8e93; font-size: 12px;
    }
    .sl-acts { display: flex; gap: 2px; flex-shrink: 0; }
    .sl-acts button {
      width: 30px; height: 30px; border: none; border-radius: 6px;
      background: transparent; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; color: #bbb;
    }
    .sl-acts button:hover { background: rgba(0,0,0,0.05); color: #555; }
    [data-theme="dark"] .sl-acts button:hover { background: rgba(255,255,255,0.06); color: #ccc; }

    /* 登录弹窗 */
    .sl-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px); display: flex; align-items: center;
      justify-content: center; z-index: 10002;
    }
    .sl-modal {
      background: #fff; border-radius: 16px; padding: 32px; max-width: 380px;
      width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] .sl-modal { background: #1c1c1e; }
    .sl-modal h3 { font-size: 18px; margin-bottom: 20px; color: #1a1a1a; text-align: center; }
    [data-theme="dark"] .sl-modal h3 { color: #e0e0e0; }
    .sl-modal input {
      width: 100%; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px; font-size: 14px; margin-bottom: 12px;
      background: rgba(255,255,255,0.8); color: #333; outline: none;
    }
    [data-theme="dark"] .sl-modal input { background: rgba(40,42,65,0.8); border-color: rgba(255,255,255,0.1); color: #ddd; }
    .sl-modal input:focus { border-color: var(--theme-color,#399FFF); }
    .sl-modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .sl-modal-actions button {
      flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .sl-modal-primary { background: var(--theme-color,#399FFF); color: #fff; }
    .sl-modal-secondary { background: rgba(0,0,0,0.05); color: #555; }
    [data-theme="dark"] .sl-modal-secondary { background: rgba(255,255,255,0.08); color: #aaa; }
    .sl-modal-error { color: #ff3b30; font-size: 12px; text-align: center; margin-bottom: 8px; display: none; }
    .sl-modal-hint { font-size: 11px; color: #bbb; text-align: center; margin-top: 12px; }
    [data-theme="dark"] .sl-modal-hint { color: #555; }

    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; background: rgba(0,0,0,0.8); color: #fff;
      border-radius: 8px; font-size: 13px; z-index: 999;
      animation: fade 2.5s ease forwards;
    }
    @keyframes fade {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      10% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    }

    @media (max-width: 480px) {
      .sl-input-card { padding: 20px; border-radius: 12px; }
      .sl-row { flex-direction: column; }
      .sl-gen-btn { width: 100%; }
      .sl-item { padding: 12px 16px; }
      .sl-list-header { padding: 16px 16px 0; }
    }
  </style>
</head>
<body>
<div class="container">
  <div id="sl-detect" class="sl-detect-overlay">
    <div class="sl-detect-box">
      <div class="sl-detect-spinner"></div>
      <h2>正在连接服务器</h2>
      <p>验证短链连通性</p>
    </div>
  </div>

  <div id="sl-unavailable" class="sl-detect-overlay" style="display:none;">
    <div class="sl-detect-box">
      <h2>短链生成器</h2>
      <p style="color:#ff3b30;font-size:15px;">
        此功能需要自建服务器运行。<br>
        请前往 <a href="https://reori.cn" style="color:var(--theme-color,#399FFF);text-decoration:underline;">reori.cn</a> 访问。
      </p>
      <button class="sl-detect-btn" onclick="location.reload()">重新检测</button>
    </div>
  </div>

  <div id="sl-app" style="display:none;">
    <div class="sl-body">
      <div class="sl-header">
        <h1><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>短链生成器</h1>
        <div class="sl-user">
          <div id="sl-badge" class="sl-badge" style="display:none;">
            <span id="sl-user"></span>
            <button class="sl-logout" id="sl-logout-btn">退出</button>
          </div>
          <button class="sl-login-btn" id="sl-login-btn">登录</button>
        </div>
      </div>

      <div class="sl-input-card">
        <label>输入长链接</label>
        <div class="sl-row">
          <input type="url" id="sl-input" placeholder="https://example.com/very/long/url" autocomplete="off">
          <button class="sl-gen-btn" id="sl-gen">生成</button>
        </div>
        <div class="sl-err" id="sl-err"></div>
        <div class="sl-result" id="sl-result">
          <small>短链接</small>
          <a id="sl-link" target="_blank"></a>
        </div>
      </div>

      <div class="sl-list-card">
        <div class="sl-list-header">短链列表</div>
        <div id="sl-anon-hint" style="display:none;padding:8px 24px 0;font-size:11px;color:#e67e22;">登录后可查看所有短链，未登录仅显示当前设备创建的链接（有效期 72h，链接本身仍可正常跳转）</div>
        <div id="sl-list"><div class="sl-empty">加载中</div></div>
      </div>
    </div>
  </div>
</div>

<div id="sl-login-modal" class="sl-modal-overlay" style="display:none;">
  <div class="sl-modal">
    <h3>BBS 账号登录</h3>
    <div class="sl-modal-error" id="sl-login-err"></div>
    <input type="text" id="sl-login-user" placeholder="用户名" autocomplete="off">
    <input type="password" id="sl-login-pass" placeholder="密码" autocomplete="off">
    <div class="sl-modal-actions">
      <button class="sl-modal-primary" onclick="slDoLogin()">登录</button>
      <button class="sl-modal-secondary" onclick="slCloseLogin()">取消</button>
    </div>
    <div class="sl-modal-hint">登录后短链永久有效，否则 72h 过期</div>
  </div>
</div>

<script src="/js/navbar.js"></script>
<script>window.showFooter = false;</script>
<script src="/js/main.js"></script>

<script>
(function() {
  window.__navActive = ["工具"];
  var TOKEN = localStorage.getItem('bbs_token') || '';
  var USER = localStorage.getItem('bbs_user') || '';
  var USER_ID = localStorage.getItem('bbs_user_id') || '';
  var ROLE = localStorage.getItem('bbs_role') || '';

  function api(m, p, b) {
    var o = { method: m, headers: { 'Content-Type': 'application/json' } };
    if (TOKEN) o.headers['X-Auth-Token'] = TOKEN;
    if (b) o.body = JSON.stringify(b);
    return fetch(p, o).then(function(r) { return r.json(); });
  }

  function $(id) { return document.getElementById(id); }
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function toast(msg, t) {
    t = t || 2500;
    var el = document.createElement('div');
    el.className = 'toast'; el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, t);
  }

  function showErr(m) { var e = $('sl-err'); e.textContent = m; e.classList.add('show'); }
  function hideErr() { $('sl-err').classList.remove('show'); }

  function showRes(url, expired) {
    var el = $('sl-result');
    $('sl-link').textContent = url;
    $('sl-link').href = url;
    el.classList.add('show');
    navigator.clipboard.writeText(url).then(function() {
      toast('已复制' + (expired ? '（72h 后过期）' : '（永久有效）'));
    });
  }

  function remain(exp) {
    var d = exp - Math.floor(Date.now() / 1000);
    if (d <= 0) return '已过期';
    var h = Math.floor(d / 3600), m = Math.floor((d % 3600) / 60);
    return h + 'h' + m + 'm';
  }

  // 检测后端
  function detect() {
    fetch('/api/ping', { cache: 'no-store' }).then(function(r) {
      if (r.ok) {
        $('sl-detect').style.display = 'none';
        $('sl-app').style.display = '';
        init();
      } else { throw new Error(); }
    }).catch(function() {
      $('sl-detect').style.display = 'none';
      $('sl-unavailable').style.display = '';
    });
  }

  // 初始化
  function init() {
    if (TOKEN) {
      // 用 BBS 验证接口检查 token 是否有效
      api('POST', '/api/bbs/auth', { verify: true }).then(function(res) {
        if (res.ok) {
          $('sl-login-btn').style.display = 'none';
          $('sl-badge').style.display = '';
          $('sl-user').textContent = res.user || USER;
          USER = res.user || USER;
          ROLE = res.role || '';
          USER_ID = res.user_id || '';
        } else {
          // token 失效，清除登录状态
          TOKEN = ''; USER = ''; USER_ID = ''; ROLE = '';
          localStorage.removeItem('bbs_token');
          localStorage.removeItem('bbs_user');
          localStorage.removeItem('bbs_user_id');
          localStorage.removeItem('bbs_role');
        }
        render();
      }).catch(function() {
        render();
      });
    } else {
      render();
    }
    $('sl-gen').addEventListener('click', gen);
    $('sl-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') gen(); });
    $('sl-logout-btn').addEventListener('click', logout);
    $('sl-link').addEventListener('click', function(e) { e.preventDefault(); });
  }

  // 登录
  $('sl-login-btn').addEventListener('click', function() {
    $('sl-login-err').style.display = 'none';
    $('sl-login-user').value = '';
    $('sl-login-pass').value = '';
    $('sl-login-modal').style.display = '';
    setTimeout(function() { $('sl-login-user').focus(); }, 100);
  });
  window.slCloseLogin = function() { $('sl-login-modal').style.display = 'none'; };
  $('sl-login-modal').addEventListener('click', function(e) { if (e.target === this) slCloseLogin(); });
  $('sl-login-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') slDoLogin(); });

  window.slDoLogin = function() {
    var u = $('sl-login-user').value.trim(), p = $('sl-login-pass').value.trim();
    if (!u || !p) { $('sl-login-err').textContent = '请输入用户名和密码'; $('sl-login-err').style.display = 'block'; return; }
    $('sl-login-err').style.display = 'none';
    api('POST', '/api/bbs/auth', { username: u, password: p }).then(function(res) {
      if (res.ok) {
        localStorage.setItem('bbs_token', res.token);
        localStorage.setItem('bbs_user', res.user || res.user_id);
        localStorage.setItem('bbs_user_id', res.user_id || '');
        localStorage.setItem('bbs_role', res.role || 'user');
        location.reload();
      } else {
        $('sl-login-err').textContent = res.error === 'auth_failed' ? '用户名或密码错误' : '登录失败';
        $('sl-login-err').style.display = 'block';
      }
    }).catch(function() { $('sl-login-err').textContent = '网络错误'; $('sl-login-err').style.display = 'block'; });
  }

  function logout() {
    localStorage.removeItem('bbs_token'); localStorage.removeItem('bbs_user');
    localStorage.removeItem('bbs_user_id'); localStorage.removeItem('bbs_role');
    location.reload();
  }

  // 生成
  function gen() {
    hideErr();
    var input = $('sl-input'), url = input.value.trim();
    if (!url) { showErr('请输入链接'); return; }
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    try { new URL(url); } catch(e) { showErr('链接格式不正确'); return; }
    var btn = $('sl-gen'); btn.disabled = true; btn.textContent = '生成中';
    api('POST', '/api/short-link', { url: url }).then(function(res) {
      btn.disabled = false; btn.textContent = '生成';
      if (res.ok) {
        showRes(window.location.origin + res.url, !!res.expires_at);
        if (!TOKEN) addMyCode(res.code);
        input.value = ''; render();
      } else { showErr(res.message || '生成失败'); }
    }).catch(function() { btn.disabled = false; btn.textContent = '生成'; showErr('网络错误'); });
  }

  // 匿名用户创建的短链 code 列表（localStorage）
  function getMyCodes() {
    try { return JSON.parse(localStorage.getItem('sl_my_codes') || '[]'); } catch(e) { return []; }
  }
  function addMyCode(code) {
    var list = getMyCodes();
    if (list.indexOf(code) === -1) { list.push(code); localStorage.setItem('sl_my_codes', JSON.stringify(list)); }
  }
  function removeMyCode(code) {
    var list = getMyCodes().filter(function(c) { return c !== code; });
    localStorage.setItem('sl_my_codes', JSON.stringify(list));
  }

  // 列表
  function render() {
    var hint = $('sl-anon-hint');
    if (hint) hint.style.display = TOKEN ? 'none' : '';
    api('GET', '/api/short-links').then(function(items) {
      var el = $('sl-list');
      if (!items || items.length === 0) { el.innerHTML = '<div class="sl-empty">还没有短链</div>'; return; }
      var myCodes = TOKEN ? null : getMyCodes();
      var filtered = TOKEN ? items : items.filter(function(it) { return myCodes.indexOf(it.code) !== -1; });
      if (filtered.length === 0) {
        el.innerHTML = '<div class="sl-empty">还没有短链</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var it = filtered[i], exp = it.expires_at || 0;
        var tag = exp ? '<span class="sl-expiry">' + remain(exp) + '</span>' : '';
        var canDel = TOKEN || myCodes.indexOf(it.code) !== -1;
        html += '<div class="sl-item">' +
          '<span class="sl-code">' + esc(it.code) + '</span>' + tag +
          '<span class="sl-url" title="' + esc(it.url) + '">' + esc(it.url) + '</span>' +
          '<div class="sl-acts">' +
          '<button onclick="copySL(\'' + it.code + '\')" title="复制"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' +
          (canDel ? '<button onclick="delSL(\'' + it.code + '\')" title="删除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' : '') +
          '</div></div>';
      }
      el.innerHTML = html;
    });
  }

  window.copySL = function(c) {
    navigator.clipboard.writeText(window.location.origin + '/s/' + c).then(function() { toast('已复制'); });
  };
  window.delSL = function(c) {
    api('POST', '/api/short-link/delete', { code: c }).then(function(res) {
      if (res.ok) { removeMyCode(c); toast('已删除'); render(); }
      else if (res.error === 'forbidden') { toast('无权删除'); }
      else { toast('删除失败'); }
    });
  };

  detect();
})();
</script>
</body>
</html>
