    username: window.localStorage.getItem('p2p_username') || generateDefaultName(),
    roomType: window.localStorage.getItem('p2p_roomType') || 'websrc',
    roomId: '',
    password: '',

  function generateDefaultName() {
    var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    var suffix = '';
    for (var i = 0; i < 4; i++) suffix += chars.charAt(Math.floor(Math.random() * chars.length));
    return '用户_' + suffix;
  }

  function truncateFileName(name, maxPre, maxSuf) {
    maxPre = maxPre || 8; maxSuf = maxSuf || 8;
    var dot = name.lastIndexOf('.');
    if (dot === -1) dot = name.length;
    var ext = dot < name.length ? name.substring(dot) : '';
    var base = dot > 0 ? name.substring(0, dot) : name;
    if (base.length <= maxPre + maxSuf) return name;
    return base.substring(0, maxPre) + '...' + base.substring(base.length - maxSuf) + ext;
  }

  function formatFileSize(bytes) {
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes >= 1024) return Math.round(bytes / 1024) + ' KB';
    return bytes + ' B';
  }

  function setDetectStep(n, status, detail) {
    var el = document.getElementById('detect-step-' + n);
    if (!el) return;
    el.className = el.className.replace(/pending|running|pass|fail/g, '') + ' ' + status;

    var pendingIcon = el.querySelector('.icon-pending');
    var runningIcon = el.querySelector('.icon-running');
    var passIcon = el.querySelector('.icon-pass');
    var failIcon = el.querySelector('.icon-fail');
    [pendingIcon, runningIcon, passIcon, failIcon].forEach(function(svg) { if (svg) svg.style.display = 'none'; });
    if (status === 'pending' && pendingIcon) pendingIcon.style.display = '';
    if (status === 'running' && runningIcon) runningIcon.style.display = '';
    if (status === 'pass' && passIcon) passIcon.style.display = '';
    if (status === 'fail' && failIcon) failIcon.style.display = '';

    var statusEl = document.getElementById('status-' + n);
    if (statusEl) {
      if (status === 'running') statusEl.textContent = '检测中';
      else if (status === 'pass') statusEl.textContent = '通过';
      else if (status === 'fail') statusEl.textContent = '失败';
      else statusEl.textContent = '';
    }

    var detailEl = document.getElementById('detect-detail-' + n);
    if (detail && detailEl) {
      detailEl.innerHTML = detail;
      detailEl.style.display = '';
    }

    // 通过项自动收起，点击可展开
    if (status === 'pass') {
      el.classList.add('p2p-detect-collapsed');
      el.style.cursor = 'pointer';
      el.addEventListener('click', function toggleDetect(e) {
        if (e.target.closest('a, button')) return;
        el.classList.toggle('p2p-detect-expanded');
      });
    }
  }

  function setProgress(pct) {
    var dots = [
      document.getElementById('prog-1'),
      document.getElementById('prog-2'),
      document.getElementById('prog-3'),
    ];
    var lines = [
      document.getElementById('prog-l1'),
      document.getElementById('prog-l2'),
    ];
    var active = pct <= 0 ? -1 : pct <= 33 ? 0 : pct <= 66 ? 1 : 2;
    dots.forEach(function(d, i) {
      if (!d) return;
      d.className = 'p2p-detect-progress-dot' + (i < active ? ' done' : '') + (i === active ? ' active' : '');
    });
    lines.forEach(function(l, i) {
      if (!l) return;
      l.className = 'p2p-detect-progress-line' + (i < active ? ' done' : '');
    });
  }

  // 显示能力徽章
  function showCapabilities(allPass, hasWebRTC, hasScreenShare) {
    var el = document.getElementById('detect-capabilities');
    if (!el) return;
    var caps = [
      { name: '即时聊天', available: true },
      { name: '文件传输', available: true },
      { name: 'WebRTC 直连', available: hasWebRTC, key: hasWebRTC ? 'available' : (p2p.backendAvail ? 'limited' : 'unavailable') },
      { name: '屏幕共享', available: hasScreenShare, key: hasScreenShare ? 'available' : (hasWebRTC ? 'limited' : 'unavailable') },
    ];
    var html = '<div class="p2p-detect-capabilities">';
    for (var i = 0; i < caps.length; i++) {
      var c = caps[i];
      var key = allPass && c.available ? 'available' : (!c.available && !p2p.backendAvail ? 'unavailable' : 'limited');
      if (c.key) key = c.key;
      var icons = { available: '✓', limited: '⚡', unavailable: '✗' };
      html += '<span class="p2p-capability-badge ' + key + '">' + icons[key] + ' ' + c.name + '</span>';
    }
    html += '</div>';
    el.innerHTML = html;
    el.style.display = '';
  }

  function showSummary(passed, html) {
    var el = document.getElementById('detect-summary');
    if (!el) return;
    el.className = 'p2p-detect-summary ' + (passed ? 'pass' : 'fail');
    el.innerHTML = html;
    el.style.display = '';
  }

  function showEnterSettingsBtn(enabled, hasWebRTC, hasScreen) {
    var wrap = document.getElementById('detect-btn-wrap');
    if (!wrap) return;
    wrap.style.display = '';

    if (enabled || p2p.backendAvail) {
      wrap.innerHTML =
        '<button class="p2p-detect-btn" id="btn-to-settings">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>' +
          '进入房间设置' +
        '</button>';
      document.getElementById('btn-to-settings').addEventListener('click', function() {
        detect.passed = enabled;
        renderSettings();
      });
    } else {
      wrap.innerHTML =
        '<button class="p2p-detect-btn" id="btn-enter-p2p" disabled>请解决以上问题后重试</button>' +
        '<br><button class="p2p-detect-retry" onclick="location.reload()">重新检测</button>';
    }
  }

  function finishDetection() {
    setProgress(100);
    var r = detect.results;
    var hasWebRTC = r.api && r.api.pass;
    var hasScreen = r.api && r.api.details && r.api.details.indexOf('getDisplayMedia: 支持') !== -1;
    var selfTestPass = r.selfTest && r.selfTest.pass;
    var backendPass = r.backend && r.backend.pass;
    var allPass = backendPass && hasWebRTC && selfTestPass;
    detect.webrtcAvailable = hasWebRTC && selfTestPass;

    if (allPass) {
      showSummary(true, '✅ 全部通过，<strong>全部功能可用</strong>');
      showCapabilities(true, true, hasScreen);
      showEnterSettingsBtn(true, true, hasScreen);
    } else if (backendPass) {
      if (hasWebRTC && !selfTestPass) {
        showSummary(false, '⚠️ <strong>仅部分功能可用</strong> — WebRTC 直连受限，可使用服务器中转模式');
        showCapabilities(false, true, hasScreen);
      } else if (!hasWebRTC) {
        showSummary(false, '⚠️ <strong>仅部分功能可用</strong> — 浏览器不支持 WebRTC，可使用服务器中转模式');
        showCapabilities(false, false, false);
      } else {
        showSummary(false, '⚠️ <strong>仅部分功能可用</strong> — 可使用服务器中转模式');
        showCapabilities(false, hasWebRTC, hasScreen);
      }
      showEnterSettingsBtn(false, hasWebRTC, hasScreen);
    } else {

    }
    detect.step = 4;
  }

  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  // ── Step 1: 浏览器 API 检测 ──

  function checkBrowserAPI() {
    var issues = [];
    var details = [];

    var RTCPC = window.RTCPeerConnection || window.webkitRTCPeerConnection || window.mozRTCPeerConnection;
    if (!RTCPC) {
      issues.push('浏览器不支持 RTCPeerConnection');
      details.push('✗ RTCPeerConnection: 不支持');
    } else {
      details.push('✓ RTCPeerConnection: 支持');
      try {
        new RTCPC({ iceServers: [] }).close();
        details.push('✓ WebRTC 初始化: 正常');
      } catch(e) {
        issues.push('WebRTC 初始化失败: ' + e.message);
        details.push('✗ WebRTC 初始化: ' + e.message);
      }
    }
    if (!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia !== 'function') {
      issues.push('屏幕共享（getDisplayMedia）不被支持');
      details.push('✗ getDisplayMedia: 不支持（屏幕共享不可用）');
    } else {
      details.push('✓ getDisplayMedia: 支持');
    }
    if (RTCPC) {
      try {
        var pc = new RTCPC({ iceServers: [] });
        try { pc.createDataChannel('detect', { negotiated: true, id: 0 }); details.push('✓ DataChannel: 支持'); }
        catch(e) { issues.push('DataChannel 创建失败: ' + e.message); details.push('✗ DataChannel: ' + e.message); }
        pc.close();
      } catch(e) { /* already caught */ }
    }
    if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== 'function') {
      details.push('✗ getUserMedia: 不支持（屏幕共享可能受限）');
    } else {
      details.push('✓ getUserMedia: 支持');
    }

    return { pass: issues.length === 0, issues: issues, details: details.join('\n') };
  }

  // ── Step 2: WebRTC 自测（双端本地回环） ──

  function runSelfTest() {
    return new Promise(function(resolve) {
      var timeout = setTimeout(function() {
        cleanup();
        resolve({ pass: false, latency: null, error: '自测超时（10s），WebRTC 可能被浏览器或网络环境阻止', details: '⏱ 超时: 10 秒内未完成连接\n→ 可能是防火墙或代理拦截了 UDP 端口' });
      }, 10000);

      var pc1, pc2, ch1, ch2;
      var pc1IceCandidates = [];
      var pc2IceCandidates = [];
      var log = [];

      function cleanup() {
        clearTimeout(timeout);
        try { if (ch1) ch1.close(); } catch(e) {}
        try { if (ch2) ch2.close(); } catch(e) {}
        try { if (pc1) pc1.close(); } catch(e) {}
        try { if (pc2) pc2.close(); } catch(e) {}
      }

      try {
        pc1 = new RTCPeerConnection({ iceServers: [] });
        pc2 = new RTCPeerConnection({ iceServers: [] });
        log.push('✓ PC1/PC2 创建成功');
      } catch(e) {
        cleanup();
        resolve({ pass: false, latency: null, error: 'RTCPeerConnection 创建失败: ' + e.message, details: '✗ 浏览器可能禁用了 WebRTC' });
        return;
      }

      var pc1GotAnswer = false, pc2GotOffer = false, ch1Open = false, ch2Open = false;
      var messages = { pc1to2: [], pc2to1: [] };
      var startTime = Date.now();

      pc1.onicecandidate = function(e) {
        if (e.candidate) {
          pc1IceCandidates.push(e.candidate.toJSON());
          if (pc2.remoteDescription && pc2.remoteDescription.type === 'offer') {
            try { pc2.addIceCandidate(new RTCIceCandidate(e.candidate.toJSON())); } catch(e) {}
          }
        }
      };
      pc2.onicecandidate = function(e) {
        if (e.candidate) {
          pc2IceCandidates.push(e.candidate.toJSON());
          if (pc1.remoteDescription && pc1.remoteDescription.type === 'answer') {
            try { pc1.addIceCandidate(new RTCIceCandidate(e.candidate.toJSON())); } catch(e) {}
          }
        }
      };

      ch1 = pc1.createDataChannel('test', { negotiated: true, id: 0 });
      ch1.onopen = function() {
        ch1Open = true;
        log.push('✓ PC1 DataChannel 已打开');
        ch1.send(JSON.stringify({ type: 'ping', from: 'pc1', ts: Date.now() }));
        log.push('→ PC1 发送 ping');
      };
      ch1.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch(e) { return; }
        if (msg.type === 'pong') {
          var rtt = Date.now() - msg.ts;
          log.push('← PC1 收到 pong（RTT: ' + rtt + 'ms）');
          messages.pc2to1.push(msg);
          checkDone(rtt);
        }
      };

      ch2 = pc2.createDataChannel('test', { negotiated: true, id: 0 });
      ch2.onopen = function() {
        ch2Open = true;
        log.push('✓ PC2 DataChannel 已打开');
        ch2.send(JSON.stringify({ type: 'ping', from: 'pc2', ts: Date.now() }));
        log.push('→ PC2 发送 ping');
      };
      ch2.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch(e) { return; }
        if (msg.type === 'ping') {
          ch2.send(JSON.stringify({ type: 'pong', from: 'pc2', ts: msg.ts }));
          log.push('← PC2 收到 ping，回复 pong');
          messages.pc1to2.push(msg);
        }
        if (msg.type === 'pong') {
          var rtt = Date.now() - msg.ts;
          log.push('← PC2 收到 pong（RTT: ' + rtt + 'ms）');
          messages.pc1to2.push(msg);
          checkDone(rtt);
        }
      };

      function checkDone(rtt) {
        if (messages.pc2to1.length > 0 || messages.pc1to2.length > 0) {
          cleanup();
          resolve({
            pass: true,
            latency: Math.round(rtt) + 'ms',
            error: null,
            details: log.join('\n') + '\n\n✅ 双向通信测试通过\nPC1 ↔ PC2 可以正常收发消息',
          });
        }
      }

      pc1.createOffer()
        .then(function(offer) { return pc1.setLocalDescription(offer); })
        .then(function() {
          log.push('✓ PC1 创建 Offer');
          return pc2.setRemoteDescription(pc1.localDescription);
        })
        .then(function() {
          log.push('✓ PC2 设置 Remote (Offer)');
          return pc2.createAnswer();
        })
        .then(function(answer) { return pc2.setLocalDescription(answer); })
        .then(function() {
          log.push('✓ PC2 创建 Answer');
          return pc1.setRemoteDescription(pc2.localDescription);
        })
        .then(function() {
          log.push('✓ PC1 设置 Remote (Answer)');
          for (var i = 0; i < pc1IceCandidates.length; i++) {
            try { pc2.addIceCandidate(new RTCIceCandidate(pc1IceCandidates[i])); } catch(e) {}
          }
          for (var j = 0; j < pc2IceCandidates.length; j++) {
            try { pc1.addIceCandidate(new RTCIceCandidate(pc2IceCandidates[j])); } catch(e) {}
          }
        })
        .catch(function(e) {
          cleanup();
          resolve({ pass: false, latency: null, error: 'Offer/Answer 交换失败: ' + e.message, details: log.join('\n') + '\n\n✗ ' + e.message });
        });
    });
  }

  // ── 执行完整检测（从 startDetectBtn 触发） ──

  async function runDetection() {
    renderDetectUI();
    setProgress(0);

    // === Step 1: 信令服务器 ===
    setDetectStep(1, 'running');
    setProgress(15);
    await sleep(200);
    try {
      var backendOk = await p2p.checkBackend();
      detect.results.backend = { pass: backendOk };
      if (backendOk) {
        setDetectStep(1, 'pass', '信令服务器正常');
        setProgress(33);
      } else {
        setDetectStep(1, 'fail', '无法连接信令服务器 — 请通过 <a href="https://reori.cn" target="_blank" style="color:var(--theme-color,#399FFF);text-decoration:underline">reori.cn</a> 访问');
        showTroubleshoot(1);
        finishDetection();
        return;
      }
    } catch(e) {
      detect.results.backend = { pass: false };
      setDetectStep(1, 'fail', '当前无法连接信令服务器 — 请通过 reori.cn 访问');
      showTroubleshoot(1);
      finishDetection();
      return;
    }

    // === Step 2: 浏览器兼容性 ===
    setDetectStep(2, 'running');
    setProgress(40);
    await sleep(200);
    var apiResult = checkBrowserAPI();
    detect.results.api = apiResult;
    if (apiResult.pass) {
      setDetectStep(2, 'pass', apiResult.details);
      setProgress(60);
    } else {
      setDetectStep(2, 'fail', apiResult.details + '\n\n检测到以下问题:\n' + apiResult.issues.join('\n'));
      showTroubleshoot(2);
      finishDetection();
      return;
    }

    // === Step 3: WebRTC 自测 ===
    setDetectStep(3, 'running');
    setProgress(70);

    var st3Start = Date.now();
    var st3Bar = document.getElementById('st3-bar');
    var st3Time = document.getElementById('st3-time');
    var st3Anim = setInterval(function() {
      var elapsed = Date.now() - st3Start;
      var pct = elapsed / 10000 * 100;
      if (st3Bar) st3Bar.style.width = Math.min(100, pct) + '%';
      if (st3Time) st3Time.textContent = (elapsed / 1000).toFixed(1) + '/10.0s';
    }, 100);

    var selfTestResult = await runSelfTest();
    clearInterval(st3Anim);
    var st3BarWrap = st3Bar && st3Bar.parentNode;
    if (st3Bar) st3Bar.style.width = '100%';
    if (st3Time) st3Time.textContent = '';
    if (st3BarWrap) setTimeout(function() { st3BarWrap.style.display = 'none'; }, 400);
    detect.results.selfTest = selfTestResult;
    if (selfTestResult.pass) {
      setDetectStep(3, 'pass', selfTestResult.details);
      setProgress(95);
    } else {
      setDetectStep(3, 'fail', '自测失败\n\n' + selfTestResult.error + '\n\n' + (selfTestResult.details || ''));
      showTroubleshoot(3);
    }

    finishDetection();
  }

  function queryRoomInfo(roomId) {
    fetch('/api/p2p/room-info?room=' + encodeURIComponent(roomId))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var hint = document.getElementById('room-info-hint');
        var typeSection = document.getElementById('settings-type-section');
        if (!hint) return;
        if (data.exists) {
          // 已有房间 → 显示信息 + 直接加入按钮（不选类型）
          var typeNames = { websrc: '⚡ WebRTC 直连', server: '🔄 服务器中转' };
          var typeTag = '<span class="p2p-room-type-tag ' + data.type + '">' + (typeNames[data.type] || data.type) + '</span>';
          var lockIcon = data.has_password ? ' 🔒' : '';
          var isFull = data.user_count >= 4;
          var capColor = isFull ? "#ff3b30" : "#8e8e93";
          var capText = data.user_count + "/4 人" + (isFull ? " · 已满" : "");
          hint.innerHTML = '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">' +

  function doJoinFromSettings(roomId, roomType) {
    roomConfig.roomId = roomId;
    roomConfig.roomType = roomType;
    roomConfig.username = document.getElementById('settings-username').value.trim();
    roomConfig.password = document.getElementById('settings-password') ? document.getElementById('settings-password').value.trim() : '';
    if (roomConfig.username) window.localStorage.setItem('p2p_username', roomConfig.username);
    window.localStorage.setItem('p2p_roomType', roomType);

    if (roomType === 'server') p2p.relayMode = true;

    detect.passed = true;

    var joinBtn = document.getElementById('btn-create-room') || document.getElementById('btn-join-existing');
    if (joinBtn) { joinBtn.disabled = true; joinBtn.textContent = '加入中…'; }

    p2p.joinRoomWithConfig(roomId, roomType, roomConfig.username, roomConfig.password).then(function(data) {
      if (joinBtn) { joinBtn.disabled = false; joinBtn.textContent = '加入房间 →'; }
      if (!data || data.peer === undefined) {
        if (data && data.error === 'wrong_password') {
          window.showToast && window.showToast('🔒 密码错误', 3000);
          roomConfig.password = '';
        } else if (data && data.error === 'room_full') {
          window.showToast && window.showToast('房间已满（上限 4 人）', 3000);
        } else if (!data) {
          window.showToast && window.showToast('加入失败，请重试', 3000);
        }
        return;
      }
      // 加入成功 → 直接渲染界面并进入已连接状态
      startP2P();
      state.connected = true;
      document.getElementById('btn-copy-room').style.display = '';
      document.getElementById('btn-leave').style.display = '';
      document.getElementById('room-input').style.display = 'none';
      var display = document.getElementById('room-id-display');
      if (display) { display.textContent = '🏠 ' + roomId; display.style.display = ''; }
      var myName = p2p.userNames[p2p.peerId] || roomConfig.username || p2p.peerId;
      document.getElementById('room-info').textContent = '房间: ' + roomId + ' | ' + myName;
      document.getElementById('room-info').title = 'ID: ' + p2p.peerId;
      setInputsEnabled(true);
      var url = new URL(window.location);
      url.searchParams.set('room', roomId);
      history.replaceState(null, '', url);
      p2p._notifyPeersChange();
      addSystemMsg('你已加入房间 ' + roomId + '（ID: ' + p2p.peerId + '）');
      if (data.peers && data.peers.length) {
        addSystemMsg('房间内已有 ' + data.peers.length + ' 人，正在连接…');
      } else {
        addSystemMsg('等待其他人加入… 点击「邀请」分享房间链接');
      }
    });
  }

  function debounce(fn, delay) {
    var timer = null;
    return function() {
      var ctx = this, args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(ctx, args); }, delay);
    };
  }

  // ════════════════════════════════════════════
  //  流量曲线图（类似任务管理器）
  // ════════════════════════════════════════════

  var trafficHistory = [];
  var TRAFFIC_HISTORY_MAX = 60;  // 60 个采样点

  function initTrafficChart() {
    trafficHistory = [];
    var canvas = document.getElementById('traffic-canvas');
    if (!canvas) return;
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    // 填充初始数据
    for (var i = 0; i < TRAFFIC_HISTORY_MAX; i++) trafficHistory.push(5 * 1024 * 1024);
    drawTrafficChart();
  }

  function updateTrafficChart(remaining) {
    trafficHistory.push(remaining);
    if (trafficHistory.length > TRAFFIC_HISTORY_MAX) trafficHistory.shift();
    drawTrafficChart();
    // 更新数字显示
    var valEl = document.getElementById('traffic-chart-current');
    if (valEl) {
      var kb = Math.round(remaining / 1024);
      if (kb > 1024) valEl.textContent = (kb / 1024).toFixed(1) + ' MB';
      else valEl.textContent = kb + ' KB';
    }
  }

  function drawTrafficChart() {
    var canvas = document.getElementById('traffic-canvas');
    if (!canvas) return;
    var rect = canvas.getBoundingClientRect();
    var w = rect.width, h = rect.height;
    var dpr = window.devicePixelRatio || 1;
    var ctx = canvas.getContext('2d');

    if (trafficHistory.length === 0) return;
    var maxVal = 5 * 1024 * 1024; // 5MB
    var minVal = 0;
    var data = trafficHistory;

    // 重置画布大小+变换矩阵，确保每帧正确
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.scale(dpr, dpr);

    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    var lineColor = '#e67e22';
    var fillColor = 'rgba(230,126,34,0.12)';
    var textColor = isDark ? '#666' : '#bbb';

    var padL = 0, padR = 0, padT = 4, padB = 0;
    var plotW = w - padL - padR;
    var plotH = h - padT - padB;

    // 网格线（水平）
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    for (var i = 0; i <= 4; i++) {
      var y = padT + (plotH / 4) * i;
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(w - padR, y);
      ctx.stroke();
    }

    if (data.length < 2) {
      return;
    }

    // 绘制填充区域
    ctx.beginPath();
    var firstX = padL;
    var firstY = padT + plotH - (data[0] - minVal) / (maxVal - minVal) * plotH;
    ctx.moveTo(firstX, padT + plotH);
    ctx.lineTo(firstX, firstY);
    for (var i = 1; i < data.length; i++) {
      var x = padL + (i / (data.length - 1)) * plotW;
      var y = padT + plotH - (data[i] - minVal) / (maxVal - minVal) * plotH;
      ctx.lineTo(x, y);
    }
    var lastX = padL + plotW;
    ctx.lineTo(lastX, padT + plotH);
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();

    // 绘制线条
    ctx.beginPath();
    ctx.moveTo(firstX, firstY);
    for (var i = 1; i < data.length; i++) {
      var x = padL + (i / (data.length - 1)) * plotW;
      var y = padT + plotH - (data[i] - minVal) / (maxVal - minVal) * plotH;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // 最新值高亮点
    var lastV = data[data.length - 1];
    var lastY = padT + plotH - (lastV - minVal) / (maxVal - minVal) * plotH;
    ctx.beginPath();
    ctx.arc(lastX, lastY, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = lineColor;
    ctx.fill();
  }

  // 窗口大小变化时重绘
  window.addEventListener('resize', function() {
    var canvas = document.getElementById('traffic-canvas');
    if (canvas && trafficHistory.length > 0) {
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      drawTrafficChart();
    }
  });

  function checkWebRTC() {
    var issues = [];
    var RTCPC = window.RTCPeerConnection || window.webkitRTCPeerConnection || window.mozRTCPeerConnection;
    if (!RTCPC) {
      issues.push('浏览器不支持 RTCPeerConnection');
    } else {
      try {
        new RTCPC({ iceServers: [] });
      } catch(e) {
        issues.push('WebRTC 初始化失败: ' + e.message);
      }
    }
    if (!navigator.mediaDevices || typeof navigator.mediaDevices.getDisplayMedia !== 'function') {
      issues.push('屏幕共享（getDisplayMedia）不被支持');
    }
    return issues;
  }

  function setupCallbacks() {
    p2p.onError = function(msg) {
      window.showToast && window.showToast(msg, 3000);
    };
    p2p.onDisconnect = function(msg) {
      var overlay = document.getElementById('p2p-disconnect-overlay');
      if (overlay) {
        var text = document.getElementById('disconnect-text');
        if (text) text.textContent = msg || '与服务器的连接已断开';
        overlay.style.display = '';
      }
      setConnStatus('disconnected', '已断连');
      addSystemMsg('⚠️ ' + msg);
    };
    // 连接成功时更新状态
    p2p.onPeersChange = (function(orig) {
      return function(connected, all) {
        setConnStatus('connected', '已连接');
        if (orig) orig(connected, all);
      };
    })(p2p.onPeersChange);
  }

  function updatePeerList(connected, all) {
    connectedPeers = connected || [];
    connectingPeers = all || [];
    var list = document.getElementById('peer-list');
    var countEl = document.querySelector('.peer-count');
    var connectedCount = connectedPeers.length;
    var connectingCount = connectingPeers.length - connectedCount;
    if (countEl) {
      countEl.textContent = (connectedCount + 1) +
        (connectingCount > 0 ? ' (+' + connectingCount + ')' : '');
    }
    if (!state.connected) {
      list.innerHTML = '<div class="p2p-sidebar-status" id="sidebar-status">未连接</div>';
      return;
    }
    var items = '';
    // 自己始终显示在最上面
    var myName = p2p.userNames[p2p.peerId] || roomConfig.username || p2p.peerId;
    items += '<div class="p2p-peer-item">' +
      '<div class="p2p-peer-dot self"></div>' +
      '<span class="p2p-peer-name"><strong>' + escapeHtml(myName) + '</strong> <span style="font-size:11px;color:#999;">(' + (p2p.peerId ? p2p.peerId.substring(0,6) : '') + ')</span></span>' +
      '<span class="p2p-peer-badge" style="color:var(--theme-color,#399FFF);font-weight:600;">我</span>' +
      '</div>';
    // 其他用户
    if (connectingPeers.length === 0) {
      items += '<div class="p2p-sidebar-status" style="padding:12px 16px;">等待他人加入…</div>';
      list.innerHTML = items;
      return;
    }
    for (var i = 0; i < connectingPeers.length; i++) {
      var id = connectingPeers[i];
      var isConnected = connectedPeers.indexOf(id) !== -1;
      var badge = '连接中…';
      var extraClass = ' connecting';
      if (isConnected) {
        badge = '已连接';
        extraClass = '';
      } else if (p2p.peers[id]) {
        var iceState = p2p.peers[id].connection ? p2p.peers[id].connection.iceConnectionState : '';
        var connState = p2p.peers[id].connection ? p2p.peers[id].connection.connectionState : '';
        if (iceState === 'connected' || iceState === 'completed') { badge = '已连接'; extraClass = ''; }
        else if (iceState === 'failed') { badge = '❌ 失败'; extraClass = ''; }
        else if (connState === 'failed' || connState === 'disconnected') { badge = '❌ 断连'; extraClass = ''; }
        else badge = iceState;
      }
      var displayName = p2p.userNames[id] || '?';
      items += '<div class="p2p-peer-item">' +
        '<div class="p2p-peer-dot' + extraClass + '"></div>' +
        '<span class="p2p-peer-name">' + escapeHtml(displayName) + ' <span style="font-size:11px;color:#999;">(' + id.substring(0,6) + ')</span></span>' +
        '<span class="p2p-peer-badge">' + badge + '</span>' +
        '</div>';
    }
    list.innerHTML = items;
  }

  function addMessage(peerId, text, id, status) {
    state.messages.push({ id: id || ('m' + (++state.msgSeq)), from: peerId, text: text, time: new Date(), type: 'chat', status: status || '' });
    renderMessages();
  }

  function updateMessageStatus(id, status) {
    for (var i = 0; i < state.messages.length; i++) {
      if (state.messages[i].id === id) {
        state.messages[i].status = status;
        renderMessages();
        return;
      }
    }
  }

  function receiveFileMeta(peerId, name, size, mime, fileId) {
    state.messages.push({
      from: peerId, name: name, mime: mime, size: size,
      fileId: fileId, type: 'file', time: new Date(),
      status: 'receiving', blob: null, progress: 0,
    });
    renderMessages();
  }

  function handleFileProgress(info) {
    if (info.mode !== 'download') return;
    for (var i = 0; i < state.messages.length; i++) {
      if (state.messages[i].fileId === info.id && state.messages[i].type === 'file') {
        var pct = Math.round(info.sent / info.total * 100);
        state.messages[i].progress = pct;
        // 节流：每 5% 才重新渲染，避免大文件卡 UI
        if (!state.messages[i]._lastRenderedPct || pct - state.messages[i]._lastRenderedPct >= 5 || pct >= 100) {
          state.messages[i]._lastRenderedPct = pct;
          renderMessages();
        }
        break;
      }
    }
  }

  function receiveFile(peerId, name, mime, blob, fileId) {
    var found = false;
    for (var i = 0; i < state.messages.length; i++) {
      if (state.messages[i].fileId === fileId && state.messages[i].type === 'file') {
        state.messages[i].blob = blob;
        state.messages[i].status = '';
        found = true;
        break;
      }
    }
    if (!found) {
      state.messages.push({
        from: peerId, name: name, mime: mime,
        blob: blob, fileId: fileId, type: 'file', time: new Date(),
      });
    }
    renderMessages();
  }

  function addSystemMsg(text) {
    state.messages.push({ type: 'system', text: text, time: new Date() });
    renderMessages();
  }

  function renderMessages() {
    var area = document.getElementById('msg-area');
    var empty = document.getElementById('empty-chat');
    if (empty) empty.style.display = 'none';
    var msgs = state.messages;
    var html = '';
    for (var i = 0; i < msgs.length; i++) {
      var m = msgs[i];
      var isSelf = m.from === p2p.peerId;
      var time = (m.time ? m.time : new Date()).toLocaleTimeString();
      if (m.type === 'system') {
        html += '<div class="p2p-system-msg">' + escapeHtml(m.text) + '</div>';
      } else if (m.type === 'chat') {
        html += '<div class="p2p-msg ' + (isSelf ? 'self' : 'other') + '">';
        if (!isSelf) html += '<div class="p2p-msg-from">' + escapeHtml(p2p.userNames[m.from] || m.from) + '</div>';
        html += '<div>' + escapeHtml(m.text) + '</div>';
        if (isSelf) html += '<span class="p2p-msg-status ' + (m.status || 'sent') + '"></span>';
        html += '<div class="p2p-msg-time">' + time + '</div></div>';
      } else if (m.type === 'file') {
        html += '<div class="p2p-file-card' + (isSelf ? ' self' : ' other') + '">';
        if (!isSelf) html += '<div class="p2p-msg-from">' + escapeHtml(p2p.userNames[m.from] || m.from) + '</div>';
        if (m.status === 'receiving') {
          var pct = m.progress || 0;
          html += '<div class="p2p-file-card-icon">📄</div>' +
            '<div class="p2p-file-card-body">' +
            '<div class="p2p-file-card-name">' + escapeHtml(m.name || '文件') + '</div>' +
            '<div class="p2p-file-card-size">' + formatFileSize(m.size || 0) + '</div>' +
            '<div class="p2p-file-dl-progress"><div class="p2p-file-dl-fill" style="width:' + pct + '%"></div></div>' +
            '<div class="p2p-file-card-status">⏳ 接收中 ' + pct + '%</div>' +
            '</div>';
        } else if (m.mime && m.mime.startsWith('image/') && m.blob) {
          if (!m._blobUrl) m._blobUrl = URL.createObjectURL(m.blob);
          var url = m._blobUrl;
          html += '<div class="p2p-file-card-image">' +
            '<img src="' + url + '" alt="图片" onclick="window.open(\'' + url + '\')">' +
            '<div class="p2p-file-card-image-name">' + escapeHtml(m.name || '图片') + '</div>' +
            '</div>';
        } else if (m.blob) {
          html += '<div class="p2p-file-card-icon">📄</div>' +
            '<div class="p2p-file-card-body">' +
            '<div class="p2p-file-card-name">' + escapeHtml(m.name || '文件') + '</div>' +
            '<div class="p2p-file-card-size">' + formatFileSize(m.blob.size) + '</div>' +
            '</div>' +
            '<button class="p2p-file-card-dl" onclick="downloadFile(' + i + ')" title="下载">⬇</button>';
        }
        html += '<div class="p2p-msg-time">' + time + '</div></div>';
      }
    }
    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  // ── 房间操作 ──

  window.joinRoom = function() {
    var room = document.getElementById('room-input').value.trim();
    if (!room) { window.showToast && window.showToast('请输入房间ID', 2000); return; }
    var username = roomConfig.username || document.getElementById('username-input').value.trim() || '';
    var roomType = roomConfig.roomType || 'websrc';
    var password = roomConfig.password || '';
    p2p.joinRoomWithConfig(room, roomType, username, password).then(function(data) {
      if (!data) return;
      if (data.error === 'wrong_password') {
        window.showToast && window.showToast('🔒 密码错误', 3000);
        roomConfig.password = '';
        // 显示密码输入
        var hint = document.getElementById('room-info-hint');
        if (hint) { hint.style.display = ''; showPasswordPrompt(room); }
        return;
      }
      state.connected = true;
      document.getElementById('btn-copy-room').style.display = '';
      document.getElementById('btn-leave').style.display = '';
      document.getElementById('room-input').style.display = 'none';
      var display = document.getElementById('room-id-display');
      if (display) { display.textContent = '🏠 ' + room; display.style.display = ''; }
      var myName = p2p.userNames[p2p.peerId] || p2p.peerId;
      document.getElementById('room-info').textContent = '房间: ' + room + ' | ' + myName;
      document.getElementById('room-info').title = 'ID: ' + p2p.peerId;
      setInputsEnabled(true);
      var url = new URL(window.location);
      url.searchParams.set('room', room);
      history.replaceState(null, '', url);
      p2p._notifyPeersChange();
      addSystemMsg('你已加入房间 ' + room + '（ID: ' + p2p.peerId + '）');
      if (data.peers && data.peers.length) {
        addSystemMsg('房间内已有 ' + data.peers.length + ' 人，正在连接…');
      } else {
        addSystemMsg('等待其他人加入… 点击「邀请」分享房间链接');
      }
    });
  };

  window.leaveRoom = function() {
    if (window._refreshTimer) { clearInterval(window._refreshTimer); window._refreshTimer = null; }
    p2p.leaveRoom().then(function() {
      state.connected = false;
      state.messages = [];
      connectedPeers = [];
      connectingPeers = [];
      roomConfig.roomId = '';
      roomConfig.password = '';
      if (window._refreshTimer) { clearInterval(window._refreshTimer); window._refreshTimer = null; }
      renderSettings();
    });
  };

  window.copyRoomLink = function() {
    var url = window.location.origin + '/Tool/p2p.html?room=' + encodeURIComponent(p2p.room);
    navigator.clipboard.writeText(url).then(function() {
      window.showToast && window.showToast('房间链接已复制', 2000);
    });
  };

  function sendChat() {
    var input = document.getElementById('chat-input');
    var text = input.value.trim();
    if (!text) return;
    var mid = 'm' + (++state.msgSeq);
    addMessage(p2p.peerId, text, mid, 'sending');
    p2p.sendChat(text);
    // DataChannel.send 同步完成，立即标记已发送
    updateMessageStatus(mid, 'sent');
    input.value = '';
  }
  window.sendChat = sendChat;

  function sendFile(file, type) {
    var truncated = truncateFileName(file.name);
    var progress = createFileProgress(file.name);
    var localMsgId = 'file-' + Date.now();

    // 本地预览（立即显示）
    if (type === 'image' || file.type.startsWith('image/')) {
      receiveFile(p2p.peerId, file.name, file.type, file, localMsgId);
    } else {
      var mime = file.type || 'application/octet-stream';
      receiveFile(p2p.peerId, file.name, mime, file, localMsgId);
    }

    // 状态回调（保留之前的 handler，避免覆盖下载进度）
    var _prevProgress = p2p.onFileProgress;
    p2p.onFileProgress = function(info) {
      if (info.mode === 'download') {
        if (_prevProgress) _prevProgress(info);
        return;
      }
      progress.update(info.sent, info.total);
    };
    p2p.onTransferStatus = function(tid, st) {
      if (st === 'cancelled' || st === 'failed') {
        if (progress.parentNode) progress.parentNode.removeChild(progress);
      } else if (st === 'sent') {
        progress.markDone();
      }
    };

    var transferId = p2p.sendFile(file);
    if (!transferId) {
      if (progress.parentNode) progress.parentNode.removeChild(progress);
      return;
    }

    // 取消按钮
    progress.querySelector('.p2p-file-cancel').onclick = function() {
      p2p.cancelTransfer(transferId);
      if (progress.parentNode) progress.parentNode.removeChild(progress);
    };
  }

  function createFileProgress(fileName) {
    var truncated = truncateFileName(fileName);
    var div = document.createElement('div');
    div.className = 'p2p-file-progress';
    div.innerHTML =
      '<div class="p2p-file-progress-name" title="' + escapeHtml(fileName) + '">' + escapeHtml(truncated) + '</div>' +
      '<div class="p2p-file-progress-track"><div class="p2p-file-progress-fill"></div></div>' +
      '<span class="p2p-file-progress-text">0%</span>' +
      '<button class="p2p-file-cancel" title="取消发送">✕</button>';
    document.getElementById('msg-area').parentNode.insertBefore(div, document.querySelector('.p2p-input'));

    div.update = function(sent, total) {
      var pct = Math.round(sent / total * 100);
      div.querySelector('.p2p-file-progress-fill').style.width = pct + '%';
      div.querySelector('.p2p-file-progress-text').textContent = pct + '%';
    };
    div.markDone = function() {
      div.querySelector('.p2p-file-progress-text').textContent = '✓';
      div.querySelector('.p2p-file-cancel').style.display = 'none';
      setTimeout(function() { if (div.parentNode) div.parentNode.removeChild(div); }, 1200);
    };
    return div;
  }

  window.downloadFile = function(index) {
    var m = state.messages[index];
    if (!m || !m.blob) return;
    var a = document.createElement('a');
    a.href = URL.createObjectURL(m.blob);
    a.download = m.name || 'file';
    a.click();
  };

  function startScreenShare() {
    p2p.startScreenShare().then(function(ok) {
      if (ok) {
        window.showToast && window.showToast('正在共享屏幕', 2000);
        document.getElementById('btn-stop-share').style.display = '';
      } else {
        window.showToast && window.showToast('屏幕共享启动失败', 2000);
      }
    });
  }

  window.stopMyScreenShare = function() {
    p2p.stopScreenShare();
    document.getElementById('btn-stop-share').style.display = 'none';
    window.showToast && window.showToast('已停止屏幕共享', 2000);
  };

  function receiveScreen(peerId, stream) {
    var container = document.getElementById('p2p-screen-container');
    var video = document.getElementById('p2p-screen-video');
    var name = p2p.userNames[peerId] || peerId;
    container.classList.add('visible');
    video.srcObject = stream;
    video.play().catch(function(){});
    addSystemMsg(name + ' 开始屏幕共享');
    stream.getVideoTracks()[0].onended = function() {
      if (container.classList.contains('visible')) {
        if (video.srcObject) {
          video.srcObject.getTracks().forEach(function(t) { t.stop(); });
          video.srcObject = null;
        }
        container.classList.remove('visible');
        screenZoom = 1;
        video.style.transform = '';
        addSystemMsg(name + ' 的屏幕共享已断开');
      }
    };
  }

  var screenZoom = 1;
  window.screenZoomIn = function() {
    var video = document.getElementById('p2p-screen-video');
    if (!video) return;
    screenZoom = Math.min(3, +(screenZoom + 0.25).toFixed(2));
    applyScreenZoom();
  };
  window.screenZoomOut = function() {
    var video = document.getElementById('p2p-screen-video');
    if (!video) return;
    screenZoom = Math.max(0.25, +(screenZoom - 0.25).toFixed(2));
    applyScreenZoom();
  };
  window.screenZoomReset = function() {
    screenZoom = 1;
    applyScreenZoom();
  };

  window.toggleFullscreen = function() {
    var container = document.getElementById('p2p-screen-container');
    var video = document.getElementById('p2p-screen-video');
    if (video && video.requestFullscreen) {
      video.requestFullscreen().catch(function(){});
    }
  };

  (function makeDraggable() {
    var container = document.getElementById('p2p-screen-container');
    var label = container.querySelector('.p2p-screen-label');
    var isDragging = false, startX, startY, origX, origY;

    label.style.cursor = 'grab';
    label.addEventListener('mousedown', function(e) {
      if (e.button !== 0) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      var rect = container.getBoundingClientRect();
      origX = rect.left;
      origY = rect.top;
      container.style.left = origX + 'px';
      container.style.top = origY + 'px';
      container.style.right = 'auto';
      container.style.bottom = 'auto';
      label.style.cursor = 'grabbing';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      var dx = e.clientX - startX;
      var dy = e.clientY - startY;
      container.style.left = (origX + dx) + 'px';
      container.style.top = (origY + dy) + 'px';
    });

    document.addEventListener('mouseup', function() {
      if (isDragging) {
        isDragging = false;
        label.style.cursor = 'grab';
      }
    });
  })();

  function applyScreenZoom() {
    var video = document.getElementById('p2p-screen-video');
    var levelEl = document.getElementById('screen-zoom-level');
    if (!video || !levelEl) return;
    video.style.transform = 'scale(' + screenZoom + ')';
    video.style.transformOrigin = 'top left';
    levelEl.textContent = screenZoom + '×';
    var container = document.getElementById('p2p-screen-container');
    var baseW = 320;
    if (screenZoom > 1) {
      container.style.width = Math.min(baseW * screenZoom, window.innerWidth * 0.85) + 'px';
    } else {
      container.style.width = baseW + 'px';
    }
  }

  function handlePeerLeave(peerId) {
    var name = p2p.userNames[peerId] || peerId;
    addSystemMsg('👋 ' + name + ' 已离开房间');
    delete p2p.userNames[peerId];
  }

  function handleScreenEnd(peerId) {
    var stopBtn = document.getElementById('btn-stop-share');
    if (stopBtn) stopBtn.style.display = 'none';
    var name = p2p.userNames[peerId] || peerId;
    var container = document.getElementById('p2p-screen-container');
    if (container.classList.contains('visible')) {
      var video = document.getElementById('p2p-screen-video');
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(function(t) { t.stop(); });
        video.srcObject = null;
      }
      container.classList.remove('visible');
      screenZoom = 1;
      document.getElementById('screen-zoom-level').textContent = '1×';
      video.style.transform = '';
      addSystemMsg(name + ' 已结束屏幕共享');
    }
  }

  function handleUserName(peerId, name) {
    p2p.userNames[peerId] = name;
    updatePeerList(connectedPeers, connectingPeers);
    renderMessages();
  }

  function updateRefreshIndicator() {
    var el = document.getElementById("refresh-indicator");
    if (!el) return;
    if (!state.connected) { el.textContent = "⏳ 未连接"; return; }
    var now = new Date();
    var m = now.getMinutes(); if (m < 10) m = "0" + m;
    var s = now.getSeconds(); if (s < 10) s = "0" + s;
    el.textContent = "⏳ " + m + ":" + s + " · 5min 刷新";
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
})();
</script>
